<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4F46E5">
<title>TikTok 素材库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f9fafb;--surface:#fff;--surface2:#f3f4f6;--surface3:#e5e7eb;--text:#111827;--text2:#6b7280;--text3:#9ca3af;--border:#e5e7eb;--indigo:#4F46E5;--indigo-light:#EEF2FF;--indigo-text:#3730A3;--emerald:#059669;--emerald-light:#ECFDF5;--emerald-text:#065F46;--rose:#E11D48;--rose-light:#FFF1F2;--rose-text:#9F1239;--sky:#0284C7;--sky-light:#F0F9FF;--sky-text:#075985;--amber:#D97706;--amber-light:#FFFBEB;--amber-text:#92400E;--violet:#7C3AED;--violet-light:#F5F3FF;--violet-text:#5B21B6;--pink:#DB2777;--pink-light:#FDF2F8;--pink-text:#9D174D;--teal:#0D9488;--teal-light:#F0FDFA;--teal-text:#115E59;--orange:#EA580C;--orange-light:#FFF7ED;--orange-text:#9A3412;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.app{max-width:1100px;margin:0 auto;padding:0 0 40px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50}
.ht{display:flex;align-items:center;justify-content:space-between;gap:12px}
.hb{display:flex;align-items:center;gap:10px}
.hl{width:30px;height:30px;background:linear-gradient(135deg,#4F46E5,#7C3AED);border-radius:7px;display:flex;align-items:center;justify-content:center}
.hl svg{width:16px;height:16px}
.header h1{font-size:15px;font-weight:700}.hs{font-size:10px;color:var(--text3);font-weight:400}
.ha{display:flex;gap:8px}
.btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:4px;transition:all 0.15s}
.bg{color:var(--text2);border:1px solid var(--border)}.bg:hover{background:var(--surface2)}
.bp{background:var(--indigo);color:#fff}.bp:hover{background:#4338CA}
.bv{background:var(--violet);color:#fff}.bv:hover{background:#6D28D9}
.btn svg{width:13px;height:13px}
.nav{display:flex;gap:2px;padding:6px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}.nav::-webkit-scrollbar{display:none}
.ni{display:flex;align-items:center;gap:4px;padding:6px 9px;font-size:11px;font-weight:500;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.ni:hover{color:var(--text);background:var(--surface2)}.ni.active{color:var(--indigo);border-bottom-color:var(--indigo)}
.nc{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.nc svg{width:9px;height:9px}
.nn{font-size:9px;background:var(--surface2);color:var(--text3);padding:0 4px;border-radius:6px;font-weight:600}.ni.active .nn{background:var(--indigo-light);color:var(--indigo)}
.tw{padding:12px 20px}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tt{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}.tt .ct{font-weight:400;color:var(--text3);font-size:12px}
.search-box{flex:1;min-width:140px;position:relative}
.search-box input{width:100%;padding:6px 10px 6px 28px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12px;background:var(--surface);color:var(--text);outline:none}
.search-box input:focus{border-color:var(--indigo)}
.search-box svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--text3)}
.sort-btn{padding:5px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px;background:var(--surface)}
.sort-btn:hover{background:var(--surface2)}
.sort-btn.active{border-color:var(--indigo);color:var(--indigo)}
.sort-btn svg{width:11px;height:11px}
.col-filter-row td{padding:4px 6px !important;background:var(--surface2);border-bottom:2px solid var(--border);position:sticky;top:33px;z-index:2}
.col-filter-input{width:100%;padding:3px 6px;border:1px solid var(--border);border-radius:3px;font-size:10px;background:var(--surface);color:var(--text);outline:none;min-width:50px}
.col-filter-input:focus{border-color:var(--indigo);box-shadow:0 0 0 2px var(--indigo-light)}
.col-filter-input::placeholder{color:var(--text3);font-size:10px}
.col-filter-input.has-value{border-color:var(--indigo);background:var(--indigo-light)}
.active-filters-bar{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.active-filter-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500;background:var(--indigo-light);color:var(--indigo);border:1px solid var(--indigo)}
.active-filter-tag .remove-filter{cursor:pointer;font-weight:700;margin-left:2px;opacity:0.6}
.active-filter-tag .remove-filter:hover{opacity:1}
.clear-all-filters{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500;color:var(--rose);border:1px solid var(--rose-light);background:var(--rose-light);cursor:pointer}
.clear-all-filters:hover{background:var(--rose);color:#fff}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}.tsc{overflow-x:auto;max-height:75vh;overflow-y:auto;position:relative}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--surface2)}thead th{padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;position:sticky;top:0;z-index:3;background:var(--surface2);cursor:pointer;transition:color .15s}
thead th:hover{color:var(--indigo)}thead th.sort-active{color:var(--indigo)}
thead th .sort-arrow{display:inline-block;margin-left:2px;font-size:8px;opacity:0.3;transition:opacity .15s}
thead th:hover .sort-arrow{opacity:0.6}thead th.sort-active .sort-arrow{opacity:1;color:var(--indigo)}
tbody tr{border-bottom:1px solid var(--border)}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:#FAFBFC}
tbody tr.retired{opacity:0.4}tbody tr.retired td{text-decoration:line-through;color:var(--text3)}
tbody td{padding:8px 10px;color:var(--text);vertical-align:top;min-width:40px;max-width:200px}
.ct2{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;cursor:pointer;word-break:break-all}.ct2.expanded{-webkit-line-clamp:unset}
.cl{color:var(--sky);text-decoration:none;font-weight:500;font-size:11px}.cl:hover{text-decoration:underline}
.cn{font-variant-numeric:tabular-nums;font-weight:500}.ce{color:var(--text3);font-size:11px}
.sku-cell{font-family:'Inter',monospace;font-size:10px;color:var(--indigo);font-weight:600;white-space:nowrap}
.time-cell{font-size:10px;color:var(--text3);white-space:nowrap}
.st{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:600}
.sp{background:var(--amber-light);color:var(--amber-text)}.si{background:var(--sky-light);color:var(--sky-text)}.sd{background:var(--emerald-light);color:var(--emerald-text)}.sr{background:var(--rose-light);color:var(--rose-text)}
.dot{width:4px;height:4px;border-radius:50%;display:inline-block}
.tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;margin:1px;background:var(--surface2);color:var(--text2)}
.te{background:var(--emerald-light);color:var(--emerald-text)}.ts2{background:var(--sky-light);color:var(--sky-text)}.ta{background:var(--amber-light);color:var(--amber-text)}.tr{background:var(--rose-light);color:var(--rose-text)}.to{background:var(--orange-light);color:var(--orange-text)}.tv{background:var(--violet-light);color:var(--violet-text)}.tp{background:var(--pink-light);color:var(--pink-text)}.tt2{background:var(--teal-light);color:var(--teal-text)}.ti{background:var(--indigo-light);color:var(--indigo-text)}
.retire-btn{padding:2px 6px;border-radius:3px;font-size:10px;color:var(--rose);border:1px solid var(--rose-light);background:var(--rose-light);cursor:pointer;white-space:nowrap}
.retire-btn:hover{background:var(--rose);color:#fff}
.stars{display:inline-flex;gap:1px;cursor:pointer}.star{font-size:14px;color:var(--border);transition:color 0.1s}.star.on{color:var(--amber)}
.note-input{width:100%;min-width:80px;padding:3px 6px;border:1px solid transparent;border-radius:3px;font-size:11px;background:transparent;color:var(--text);outline:none}
.note-input:focus{border-color:var(--indigo);background:var(--surface)}
.trans-row{font-size:10px;color:var(--sky-text);margin-top:2px;line-height:1.4;padding:1px 4px;background:var(--sky-light);border-radius:3px;display:inline-block;max-width:100%;word-break:break-all}
.trans-loading{font-size:10px;color:var(--text3);margin-top:2px;font-style:italic}

/* === 登录 & 账号管理样式 === */
.login-wrap{position:fixed;inset:0;background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 50%,#DB2777 100%);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-box .logo{text-align:center;margin-bottom:24px}
.login-box .logo h2{font-size:20px;font-weight:700;margin-top:8px}
.login-box .logo p{font-size:12px;color:var(--text3)}
.login-err{font-size:12px;color:var(--rose);text-align:center;margin-bottom:8px;min-height:18px}
.user-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-sm);background:var(--surface2);font-size:11px;color:var(--text2);cursor:pointer}
.user-badge:hover{background:var(--surface3)}
.user-badge .avatar{width:22px;height:22px;border-radius:50%;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.perm-grid{display:grid;gap:6px}
.perm-group{margin-bottom:12px}
.perm-group-title{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text2);padding-bottom:4px;border-bottom:1px solid var(--border)}
.perm-item{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer}
.perm-item:hover{background:var(--surface2)}
.perm-item input[type=checkbox]{accent-color:var(--indigo);width:16px;height:16px}
.perm-item .perm-desc{font-size:10px;color:var(--text3)}
.user-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;transition:all .15s}
.user-card:hover{border-color:var(--indigo);box-shadow:0 2px 8px rgba(79,70,229,0.08)}
.user-card .uc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.user-card .uc-name{font-size:13px;font-weight:600}
.user-card .uc-user{font-size:11px;color:var(--text3)}
.user-card .uc-perms{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:12px}
.loading{text-align:center;padding:30px;color:var(--text3);font-size:12px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi 0.15s}
@keyframes fi{from{opacity:0}to{opacity:1}}@keyframes sci{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:sci 0.2s ease-out;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal.wide{max-width:720px}
.mh{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px}.mh h3{font-size:15px;font-weight:700}
.mx{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2)}.mx:hover{background:var(--surface3)}
.mbo{padding:0 20px 20px}.fg{margin-bottom:14px}.fl{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}.fl .rq{color:var(--rose)}
.finp{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;background:var(--surface);color:var(--text);outline:none}.finp:focus{border-color:var(--indigo)}
textarea.finp{resize:vertical;min-height:100px;line-height:1.5}
select.finp{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%239ca3af'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.bs{width:100%;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--indigo);color:#fff;font-size:13px;font-weight:600;margin-top:6px;cursor:pointer}.bs:hover{background:#4338CA}.bs:disabled{background:var(--surface3);color:var(--text3)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;z-index:200;animation:fi 0.2s;box-shadow:0 6px 20px rgba(0,0,0,0.12)}.tgs{background:var(--emerald);color:#fff}.tge{background:var(--rose);color:#fff}

/* === 成片组装样式 === */
#assembleView{display:none}
.asm-wrap{padding:16px 20px}
.asm-steps{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.asm-step{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .15s}
.asm-step:hover{border-color:var(--indigo);color:var(--text)}
.asm-step.active{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.asm-step.done{background:var(--emerald-light);color:var(--emerald-text);border-color:var(--emerald)}
.asm-step .step-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--surface2);color:var(--text3)}
.asm-step.active .step-num{background:rgba(255,255,255,0.25);color:#fff}
.asm-step.done .step-num{background:var(--emerald);color:#fff}
.asm-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:300px;box-shadow:var(--shadow)}
.asm-panel h4{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.asm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.asm-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:all .15s;background:var(--surface);position:relative}
.asm-card:hover{border-color:var(--indigo);box-shadow:0 2px 8px rgba(79,70,229,0.1)}
.asm-card.selected{border-color:var(--indigo);background:var(--indigo-light);box-shadow:0 0 0 2px rgba(79,70,229,0.2)}
.asm-card .card-title{font-size:12px;font-weight:600;margin-bottom:4px}
.asm-card .card-sub{font-size:10px;color:var(--text2);margin-bottom:4px}
.asm-card .card-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;margin-right:3px}
.asm-card .card-check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center}
.asm-card.selected .card-check{background:var(--indigo);border-color:var(--indigo);color:#fff}
.asm-card .card-preview{font-size:10px;color:var(--text3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:4px}
.asm-section{margin-bottom:16px}
.asm-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.asm-section-title .emoji{font-size:14px}
.asm-nav-btns{display:flex;justify-content:space-between;margin-top:16px;gap:10px}
.asm-nav-btns .btn{padding:8px 20px;font-size:13px}
.preview-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.preview-card h5{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.pager{display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;font-size:12px;flex-wrap:wrap}
.pager button{padding:4px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;min-width:32px}
.pager button:hover{background:var(--surface2);border-color:var(--indigo)}
.pager button.active{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.pager button:disabled{opacity:0.4;cursor:default}
.pager .pg-info{color:var(--text3);font-size:11px;margin:0 8px}
.detail-row{display:none;background:var(--surface2)}
.detail-row.show{display:table-row}
.detail-row td{padding:8px 10px !important;border-bottom:2px solid var(--border)}
.detail-inner{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--text2)}
.detail-inner .di{display:flex;flex-direction:column;gap:2px;min-width:80px}
.detail-inner .di label{font-size:9px;color:var(--text3);text-transform:uppercase;font-weight:600;letter-spacing:0.3px}
.detail-inner .di span{font-size:12px;color:var(--text)}
.preview-card .pv-content{font-size:12px;line-height:1.6;color:var(--text)}
.preview-card .pv-empty{font-size:11px;color:var(--text3);font-style:italic}

@media(max-width:640px){.header{padding:10px 14px}.nav{padding:4px 14px 0}.tw{padding:10px 14px}thead th,tbody td{padding:6px 7px}.modal{max-height:90vh;border-radius:var(--radius) var(--radius) 0 0;align-self:flex-end}.mo{align-items:flex-end;padding:0}.asm-grid{grid-template-columns:1fr}.asm-wrap{padding:10px 14px}}

/* === 拍摄指导样式 === */
.guide-modal{max-width:700px;max-height:90vh}
.guide-content{padding:0 20px 20px;overflow-y:auto;max-height:calc(90vh - 60px)}
.guide-content h2{font-size:16px;font-weight:700;margin:18px 0 8px;color:var(--indigo);display:flex;align-items:center;gap:6px}
.guide-content h3{font-size:14px;font-weight:600;margin:14px 0 6px;color:var(--text)}
.guide-content p{font-size:13px;line-height:1.7;margin-bottom:8px;color:var(--text)}
.guide-content ul,.guide-content ol{font-size:13px;line-height:1.7;margin:4px 0 10px 18px;color:var(--text)}
.guide-content li{margin-bottom:4px}
.guide-content strong{color:var(--indigo-text);font-weight:600}
.guide-content em{color:var(--amber-text);font-style:normal;font-weight:500}
.guide-content code{background:var(--surface2);padding:1px 4px;border-radius:3px;font-size:12px;color:var(--rose)}
.guide-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.guide-section-title{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;color:var(--indigo)}
.guide-loading{text-align:center;padding:40px;color:var(--text3)}
.guide-loading .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.guide-actions{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.guide-actions .btn{padding:8px 16px;font-size:12px}

/* === 成品管理样式 === */
#productionsView .preview-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;background:var(--surface)}
#productionsView .preview-card h5{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)}
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">

function filterRows(rows){
  var res=rows;
  if(searchTerm){var s=searchTerm.toLowerCase();res=res.filter(function(r){return Object.values(r).some(function(v){return v&&String(v).toLowerCase().indexOf(s)!==-1})})}
  Object.keys(colFilter).forEach(function(col){
    var fv=colFilter[col];if(fv){var fvl=fv.toLowerCase();res=res.filter(function(r){var val=r[col];if(val===null||val===undefined)return false;if(Array.isArray(val)){return val.some(function(item){return String(LN[item]||item).toLowerCase().indexOf(fvl)!==-1})}return String(val).toLowerCase().indexOf(fvl)!==-1})}
  });

  // 列排序（前端排序，支持数字/时间/文本）
  if(sortCol){
    var dir=sortDir==="asc"?1:-1;
    res=res.slice().sort(function(a,b){
      var va=a[sortCol],vb=b[sortCol];
      // null值排最后
      if(va===null||va===undefined)return 1;
      if(vb===null||vb===undefined)return -1;
      // 时间列
      if(sortCol.includes("_at")||sortCol.includes("_time")){
        var da=new Date(va).getTime()||0,db=new Date(vb).getTime()||0;
        return (da-db)*dir;
      }
      // 数字列
      var na=Number(va),nb=Number(vb);
      if(!isNaN(na)&&!isNaN(nb))return (na-nb)*dir;
      // 文本列
      return String(va).localeCompare(String(vb),"zh")*dir;
    });
  }

  var active=res.filter(function(r){return !r.is_retired});var retired=res.filter(function(r){return r.is_retired});return active.concat(retired);
}

async function doLinkSubmit(){
  var url=document.getElementById("linkUrl").value.trim();
  if(!url){toast("请粘贴链接","tge");return}
  if(!url.includes("tiktok.com")&&!url.includes("douyin.com")&&!url.includes("iesdouyin.com")){toast("请粘贴TikTok或抖音链接","tge");return}
  var btn=document.getElementById("linkBtn");btn.disabled=true;btn.textContent="抓取中...";
  var sb=document.getElementById("linkSubmitter").value.trim()||"运营";
  localStorage.setItem("submitter",sb);

  try{
    // 判断是否是抖音链接
    var isDouyin=url.includes("douyin.com")||url.includes("iesdouyin.com");

    if(isDouyin){
      // 抖音链接：TikAPI不支持抖音，直接提交AI分析
      btn.textContent="抖音链接，提交AI分析...";
      setLinkProgress("⏳ 抖音链接不支持数据抓取，将直接提交AI进行内容分析...");
      var douyinData={raw_content:"【抖音视频拆解】\n链接: "+url+"\n\n请根据此抖音视频链接，分析该视频的内容结构、钩子话术、拍摄手法、CTA策略、痛点切入等信息，拆解为可复用的素材。",source_url:url,source_platform:"抖音",submitter:sb,content_type:"competitor_video"};
      await fetch(qa("material_intake"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation","apikey":K},body:JSON.stringify(douyinData)});
      hideLinkModal();toast("抖音链接已提交，AI分析中...","tgs");at="material_intake";rN();setTimeout(refreshAll,1000);setTimeout(refreshAll,70000);
      return;
    }

    // TikTok链接处理
    var hasVideoId=/video\/\d+/.test(url);
    if(!hasVideoId){
      // 短链接：直接提交给AI分析
      btn.textContent="短链接，直接提交AI...";
      setLinkProgress("短链接无法直接解析，将作为素材提交AI分析...");
      var fallbackData={raw_content:"【TikTok视频链接】\n链接: "+url+"\n\n请分析此TikTok视频链接对应的视频内容。",source_url:url,source_platform:"TikTok",submitter:sb,content_type:"link_scrape"};
      await fetch(qa("material_intake"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation","apikey":K},body:JSON.stringify(fallbackData)});
      hideLinkModal();toast("链接已提交，AI分析中...","tgs");at="material_intake";rN();setTimeout(refreshAll,1000);setTimeout(refreshAll,70000);
      return;
    }

    // 长链接：通过 Supabase RPC 调用服务端代理函数
    btn.textContent="正在抓取视频+评论...";
    setLinkProgress("⏳ 正在通过服务端抓取视频信息和评论（约5-10秒）...");

    var rpcResp=await fetch(U+"/rest/v1/rpc/scrape_tiktok_link",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":K},
      body:JSON.stringify({tiktok_url:url,submitter_name:sb})
    });

    if(!rpcResp.ok){
      var errText=await rpcResp.text();
      // 如果RPC函数不存在，回退到纯文本提交
      if(errText.includes("could not find") || errText.includes("does not exist")){
        setLinkProgress("⚠️ 代理函数未安装，回退到纯文本提交...");
        var fallback2={raw_content:"【TikTok视频链接抓取】\n链接: "+url+"\n\n请根据此链接分析该视频的内容结构、钩子话术、评论区热度等信息。",source_url:url,source_platform:"TikTok",submitter:sb,content_type:"link_scrape"};
        await fetch(qa("material_intake"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation","apikey":K},body:JSON.stringify(fallback2)});
        hideLinkModal();toast("已提交AI分析（请先安装SQL代理函数以启用完整抓取）","tgs");at="material_intake";rN();setTimeout(refreshAll,1000);setTimeout(refreshAll,70000);
        return;
      }
      throw new Error("RPC调用失败: "+errText);
    }

    var result=await rpcResp.json();

    if(result.success){
      hideLinkModal();
      toast("抓取成功！播放"+Number(result.views||0).toLocaleString()+" 点赞"+Number(result.likes||0).toLocaleString()+"，AI正在分发...","tgs");
      at="material_intake";rN();
      setTimeout(refreshAll,2000);
      setTimeout(refreshAll,70000);
    }else{
      throw new Error(result.message||"抓取失败");
    }

  }catch(e){
    toast("抓取失败: "+e.message,"tge");
    console.error("TikTok抓取错误:",e);
  }finally{
    btn.disabled=false;btn.textContent="自动抓取 · AI 分发入库";setLinkProgress("");
  }
}

function initAssemble(){asmStep=0;renderAsmSteps();renderAsmPanel()}

function renderAsmSteps(){
  var h="";ASM_STEPS.forEach(function(s,i){
    var cls="asm-step";
    if(i===asmStep)cls+=" active";
    else if(i<asmStep){
      var hasData=s.multi?(asmData[s.id]&&asmData[s.id].length>0):!!asmData[s.id];
      if(hasData)cls+=" done";
    }
    var count="";
    if(s.multi&&asmData[s.id]&&asmData[s.id].length>0)count=' <span style="background:var(--indigo);color:#fff;padding:0 5px;border-radius:8px;font-size:9px">'+asmData[s.id].length+'</span>';
    h+='<button class="'+cls+'" onclick="goAsmStep('+i+')"><span class="step-num">'+(i+1)+'</span>'+s.emoji+" "+s.label+count+'</button>';
  });
  document.getElementById("asmSteps").innerHTML=h;
}

function goAsmStep(i){asmStep=i;renderAsmSteps();renderAsmPanel()}

async function loadAsmData(table){
  if(asmCache[table])return asmCache[table];
  try{
    var params;
    if(table==="frameworks"){
      params="order=created_at.desc&limit=80";
    }else if(table==="trending_videos"||table==="trending_music"||table==="trending_hashtag_stats"||table==="creator_rankings"||table==="brand_directory"){
      params="order=heat_score.desc.nullslast&limit=50";
    }else{
      params="is_retired=eq.false&order=rating.desc.nullslast,created_at.desc&limit=80";
    }
    var r=await fetch(qa(table,params));if(!r.ok)return[];var d=await r.json();asmCache[table]=d;return d;
  }catch(e){return[]}
}

function isAsmSelected(stepId,rowId){
  var step=ASM_STEPS[asmStep];
  if(!step.multi){return asmData[stepId]&&asmData[stepId].id===rowId}
  return (asmData[stepId]||[]).some(function(r){return r.id===rowId});
}

function toggleAsmSelect(stepId,rowId,multi){
  var found=null;
  Object.values(asmCache).forEach(function(arr){arr.forEach(function(r){if(r.id===rowId)found=r})});
  if(!found)return;
  if(!multi){
    // 单选：toggle
    if(asmData[stepId]&&asmData[stepId].id===rowId){asmData[stepId]=null}
    else{asmData[stepId]=found}
  }else{
    // 多选：toggle in array
    if(!asmData[stepId])asmData[stepId]=[];
    var idx=asmData[stepId].findIndex(function(r){return r.id===rowId});
    if(idx>=0){asmData[stepId].splice(idx,1)}
    else{asmData[stepId].push(found)}
  }
  renderAsmSteps();renderAsmPanel();
}

function renderAsmTable(stepId,items,tableName,multi){
  var cfg=ASM_COLS[tableName];if(!cfg)return '<div class="empty">未定义列配置</div>';
  var h='<div class="tsc"><table><thead><tr><th style="width:30px">选</th>';
  cfg.cols.forEach(function(c,i){h+='<th>'+cfg.names[i]+'</th>'});
  h+='</tr></thead><tbody>';
  if(!items.length){
    h+='<tr><td colspan="'+(cfg.cols.length+1)+'" style="text-align:center;padding:30px;color:var(--text3)">暂无数据</td></tr>';
  }else{
    items.forEach(function(r){
      var sel=isAsmSelected(stepId,r.id);
      h+='<tr style="cursor:pointer;'+(sel?'background:var(--indigo-light);':'')+'" onclick="toggleAsmSelect(\''+stepId+'\',\''+r.id+'\','+multi+')">';
      h+='<td style="text-align:center"><div style="width:16px;height:16px;border-radius:'+(multi?'3px':'50%')+';border:2px solid '+(sel?'var(--indigo)':'var(--border)')+';display:inline-flex;align-items:center;justify-content:center;background:'+(sel?'var(--indigo)':'var(--surface)')+'"><span style="color:#fff;font-size:10px;font-weight:700">'+(sel?'✓':'')+'</span></div></td>';
      cfg.cols.forEach(function(c){
        var v=r[c];
        if(v===null||v===undefined||v==="")v='<span class="ce">—</span>';
        else if(c==="heat_score")v='<span class="cn" style="color:var(--rose);font-weight:700">'+fmtNum(v)+'</span>';
        else if(c==="view_count"||c==="like_count"||c==="comment_count"||c==="share_count"||c==="creator_followers"||c==="usage_count"||c==="total_views")v='<span class="cn">'+fmtNum(v)+'</span>';
        else if(c==="video_url")v=v?'<a class="cl" href="'+v+'" target="_blank" onclick="event.stopPropagation()">查看</a>':'<span class="ce">—</span>';
        else if(Array.isArray(v))v=v.length?v.slice(0,3).map(function(t){return '<span class="tag ti">'+t+'</span>'}).join(""):'<span class="ce">—</span>';
        else if(c==="difficulty"){var dc={"入门":"te","进阶":"ta","高阶":"tr"};v='<span class="tag '+(dc[v]||"")+'">'+v+'</span>'}
        else if(TG[c])v='<span class="tag '+TG[c]+'">'+v+'</span>';
        else v='<div class="ct2" style="-webkit-line-clamp:2">'+String(v)+'</div>';
        h+='<td>'+v+'</td>';
      });
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>';
  return h;
}

async function renderAsmPanel(){
  var step=ASM_STEPS[asmStep];var panel=document.getElementById("asmPanel");
  panel.innerHTML='<div class="loading">加载中...</div>';

  if(step.id==="preview"){renderPreview(panel);return}

  var items=await loadAsmData(step.table);
  if(step.filter)items=items.filter(step.filter);

  // 已选数量
  var selCount=step.multi?(asmData[step.id]||[]).length:(asmData[step.id]?1:0);
  var h='<h4>'+step.emoji+' '+step.label+' <span style="font-size:11px;font-weight:400;color:var(--text3)">— '+step.desc+'</span>';
  if(selCount>0)h+=' <span style="font-size:11px;font-weight:600;color:var(--indigo);margin-left:8px">已选 '+selCount+' 条</span>';
  h+='</h4>';

  // 主表格
  h+='<div class="tc" style="margin-bottom:12px">'+renderAsmTable(step.id,items,step.table,step.multi)+'</div>';

  // 额外表（支持多个，如CTA步骤有评论表+爆款视频表）
  if(step.extras&&step.extras.length){
    for(var ei=0;ei<step.extras.length;ei++){
      var ext=step.extras[ei];
      var extraItems=await loadAsmData(ext.table);
      if(ext.limit)extraItems=extraItems.slice(0,ext.limit);
      h+='<div class="asm-section-title" style="margin:12px 0 8px">'+ext.label+' ('+extraItems.length+')</div>';
      h+='<div class="tc">'+renderAsmTable(step.id,extraItems,ext.table,step.multi)+'</div>';
    }
  }

  h+=asmNavBtns();
  panel.innerHTML=h;
}

function asmNavBtns(){
  var h='<div class="asm-nav-btns">';
  if(asmStep>0)h+='<button class="btn bg" onclick="goAsmStep('+(asmStep-1)+')">← 上一步</button>';else h+='<span></span>';
  if(asmStep<ASM_STEPS.length-1)h+='<button class="btn bp" onclick="goAsmStep('+(asmStep+1)+')">下一步 →</button>';
  h+='</div>';return h;
}

async function saveProduction(){
  var fw=asmData.framework;if(!fw){toast("请先选择框架","tge");return}

  // 安全提取ID：只在素材确实来自对应表时才填外键字段
  function safeId(arr,expectedTable){
    if(!arr||!arr.length)return null;
    // 如果素材来自extras表（非主表），不能填外键
    // 通过检查字段特征来判断来源
    return null; // 统一不填外键，改用JSON存全部素材
  }

  // 构建选中素材的完整JSON快照
  var selectedMaterials={
    framework:fw?{id:fw.id,name:fw.name,formula:fw.formula,core_logic:fw.core_logic}:null,
    stop:(asmData.stop||[]).map(function(d){return {id:d.id,text:d.script_cn||d.comment_cn||d.script_en||d.comment_en||"",type:d.video_stage||d.convertible_to||""}}),
    pain:(asmData.pain||[]).map(function(d){return {id:d.id,scene:d.scene_name||"",pain:d.user_pain||"",angle:d.product_angle||""}}),
    visual:(asmData.visual||[]).map(function(d){return {id:d.id,desc:d.shot_description||"",type:d.shot_type||""}}),
    proof:(asmData.proof||[]).map(function(d){return {id:d.id,name:d.name||"",type:d.proof_type||""}}),
    buy:(asmData.buy||[]).map(function(d){return {id:d.id,text:d.script_cn||d.name||"",type:d.action_type||d.benefit_type||""}}),
    bgm:(asmData.bgm||[]).map(function(d){return {id:d.id,name:d.name||d.music_title||"",emotion:d.emotion_type||""}}),
    rhythm:(asmData.rhythm||[]).map(function(d){return {id:d.id,name:d.template_name||"",duration:d.total_duration||"",beat:d.beat_structure||""}})
  };

  var prodSku=document.getElementById("prodSku")?document.getElementById("prodSku").value.trim():"";
  var prodSubmitter=document.getElementById("prodSubmitter")?document.getElementById("prodSubmitter").value.trim():"";
  if(prodSubmitter)localStorage.setItem("submitter",prodSubmitter);
  if(prodSku){var prefix=prodSku.replace(/\d+$/,"");if(prefix)localStorage.setItem("last_prod_sku_prefix",prefix)}

  var data={
    title:(prodSku?prodSku+" — ":"")+(fw.name||"方案")+" — "+new Date().toLocaleDateString("zh-CN"),
    framework_id:fw.id,
    formula:fw.formula,
    selected_materials:selectedMaterials,
    sku:prodSku||null,
    submitter:prodSubmitter||null
  };
  try{
    var r=await fetch(qa("productions"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation","apikey":K},body:JSON.stringify(data)});
    if(!r.ok){
      var errText=await r.text();
      // 如果 selected_materials 列不存在，回退到只存基本字段
      if(errText.includes("selected_materials")){
        var fallbackData={
          title:data.title,
          framework_id:fw.id,
          formula:fw.formula
        };
        var r2=await fetch(qa("productions"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation","apikey":K},body:JSON.stringify(fallbackData)});
        if(!r2.ok)throw new Error(await r2.text());
        toast("成片方案已保存！（建议执行SQL添加 selected_materials 列以保存完整素材）","tgs");
      }else{
        throw new Error(errText);
      }
    }else{
      toast("成片方案已保存！","tgs");
    }
    asmData={framework:null,stop:[],pain:[],visual:[],proof:[],buy:[],bgm:[],rhythm:[]};
    asmStep=0;renderAsmSteps();renderAsmPanel();
  }catch(e){toast("保存失败: "+e.message,"tge")}
}

      return (i+1)+". "+(d.shot_description||"—")+" | 类型:"+(d.shot_type||"—")+" | 作用:"+(d.purpose||"—")+" | 阶段:"+(d.video_stage||"—");
    }).join("\n"));
  }

  // 社会证明
  var proofs=asmData.proof||[];
  if(proofs.length){
    parts.push("【社会证明（信）】\n"+proofs.map(function(d,i){

    }).join("\n"));
  }

  // 促单CTA
  var buys=asmData.buy||[];
  if(buys.length){
    parts.push("【促单CTA（买）】\n"+buys.map(function(d,i){
      return (i+1)+". "+(d.script_cn||d.name||"—")+" | 类型:"+(d.action_type||d.benefit_type||"—")+" | 逻辑:"+(d.script_logic||d.description||"—");
    }).join("\n"));

  // BGM
  var bgms=asmData.bgm||[];

      return (i+1)+". "+(d.name||d.music_title||"—")+" | 情绪:"+(d.emotion_type||"—")+" | 适用:"+(d.applicable_content||"—")+" | 特征:"+(d.features||"—");

async function generateShootingGuide(guideType){
  if(!asmData.framework){toast("请先选择框架","tge");return}

  var btnId=guideType==="photo"?"genGuideBtn":"genGuideBtn2";
  var btn=document.getElementById(btnId);
  if(btn){btn.disabled=true;btn.innerHTML='⏳ 提交中...';}

  showGuideModal();
  var content=document.getElementById("guideContent");
  var typeLabel=guideType==="photo"?"📷 照片拍摄指导":"🎬 视频拍摄指导";
  content.innerHTML='<div class="guide-loading"><div class="spinner"></div><p>正在生成'+typeLabel+'...</p></div>';

  // 加载拍摄参数库数据作为参考
  var shootingParams=await loadAsmData("shooting_params");
  var prompt=buildGuidePrompt(shootingParams,guideType);

  try{
    // 第1步：提交异步任务（pg_net发送，不等待结果）
    var r=await fetch(U+"/rest/v1/rpc/submit_shooting_guide",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":K},
      body:JSON.stringify({p_system:prompt.system,p_user:prompt.user})
    });

    if(!r.ok){
      var errText=await r.text();
      if(errText.includes("does not exist")||errText.includes("could not find")){
        throw new Error("NOT_INSTALLED");
      }
      throw new Error("提交失败: "+errText.substring(0,200));
    }

    var result=await r.json();
    if(!result.task_id){throw new Error("未返回task_id")}

    // 第2步：轮询结果
    content.innerHTML='<div class="guide-loading"><div class="spinner"></div><p>AI正在生成拍摄指导...</p><p style="font-size:11px;color:var(--text3);margin-top:6px">通常需要20-40秒，请耐心等待</p><p id="guidePollStatus" style="font-size:10px;color:var(--text3);margin-top:4px"></p></div>';
    btn.innerHTML='⏳ 生成中...';

    var taskId=result.task_id;
    var maxAttempts=40; // 最多轮询40次 x 3秒 = 2分钟
    var attempt=0;

    var pollInterval=setInterval(async function(){
      attempt++;
      var statusEl=document.getElementById("guidePollStatus");
      if(statusEl)statusEl.textContent="等待中... ("+attempt+"/"+maxAttempts+")";

      if(attempt>=maxAttempts){
        clearInterval(pollInterval);
        content.innerHTML='<div class="guide-loading"><p style="color:var(--amber)">⏱️ 生成超时，请重试</p><div class="guide-actions"><button class="btn bg" onclick="generateShootingGuide()">🔄 重试</button><button class="btn bp" onclick="copyGuidePrompt()">📋 复制Prompt手动生成</button></div></div>';
        if(btn){btn.disabled=false;btn.innerHTML=guideType==='photo'?'📷 照片拍摄指导':'🎬 视频拍摄指导'};
        return;
      }

      try{
        var pr=await fetch(qa("shooting_guide_tasks","id=eq."+taskId+"&select=status,result_text,error_message"),{headers:{"apikey":K}});
        if(!pr.ok)return;
        var rows=await pr.json();
        if(!rows.length)return;
        var task=rows[0];

        if(task.status==="done"&&task.result_text){
          clearInterval(pollInterval);
          renderGuideResult(content,task.result_text);
          if(btn){btn.disabled=false;btn.innerHTML=guideType==='photo'?'📷 照片拍摄指导':'🎬 视频拍摄指导'};
        }else if(task.status==="error"){
          clearInterval(pollInterval);
          content.innerHTML='<div class="guide-loading"><p style="color:var(--rose)">⚠️ 生成失败: '+(task.error_message||"未知错误")+'</p><div class="guide-actions"><button class="btn bg" onclick="generateShootingGuide()">🔄 重试</button><button class="btn bp" onclick="copyGuidePrompt()">📋 复制Prompt手动生成</button></div></div>';
          if(btn){btn.disabled=false;btn.innerHTML=guideType==='photo'?'📷 照片拍摄指导':'🎬 视频拍摄指导'};
        }
      }catch(pe){}
    },3000);

  }catch(e){
    console.error("拍摄指导提交失败:",e.message);
    var isNotInstalled=e.message==="NOT_INSTALLED";
    content.innerHTML='<div class="guide-loading"><p style="color:var(--rose)">⚠️ '+(isNotInstalled?'请先安装数据库函数':'提交失败: '+e.message)+'</p><p style="font-size:11px;color:var(--text3);margin-top:8px">'+(isNotInstalled?'请在 Supabase SQL Editor 中执行 <strong>setup_shooting_guide.sql</strong>':'请检查数据库函数配置')+'</p><div class="guide-actions"><button class="btn bg" onclick="generateShootingGuide()">🔄 重试</button><button class="btn bp" onclick="copyGuidePrompt()">📋 复制Prompt手动生成</button></div></div>';
    if(btn){btn.disabled=false;btn.innerHTML=guideType==='photo'?'📷 照片拍摄指导':'🎬 视频拍摄指导'};
  }
}

function renderGuideResult(contentEl,mdText){
  // 简单的Markdown→HTML转换
  var html=mdToHtml(mdText);

  contentEl.innerHTML='<div style="margin-bottom:12px">'+html+'</div>'+
    '<div class="guide-actions">'+
    '<button class="btn bp" onclick="copyGuideText()">📋 复制全文</button>'+
    '<button class="btn bg" onclick="downloadGuide()">💾 下载文档</button>'+
    '<button class="btn bg" onclick="generateShootingGuide()">🔄 重新生成</button>'+
    '</div>';

  // 保存原始文本供复制和下载
  contentEl.dataset.rawText=mdText;
}

function mdToHtml(md){
  // 基础Markdown转HTML
  var lines=md.split("\n");
  var html="";var inList=false;var listType="";

  for(var i=0;i<lines.length;i++){
    var line=lines[i];

    // 标题
    if(line.match(/^###\s/)){
      if(inList){html+=listType==="ol"?"</ol>":"</ul>";inList=false}
      html+="<h3>"+processInline(line.replace(/^###\s/,""))+"</h3>";continue;
    }
    if(line.match(/^##\s/)){
      if(inList){html+=listType==="ol"?"</ol>":"</ul>";inList=false}
      html+="<h2>"+processInline(line.replace(/^##\s/,""))+"</h2>";continue;
    }
    if(line.match(/^#\s/)){
      if(inList){html+=listType==="ol"?"</ol>":"</ul>";inList=false}
      html+="<h2>"+processInline(line.replace(/^#\s/,""))+"</h2>";continue;
    }

    // 有序列表
    if(line.match(/^\d+\.\s/)){
      if(!inList||listType!=="ol"){if(inList)html+=listType==="ol"?"</ol>":"</ul>";html+="<ol>";inList=true;listType="ol"}
      html+="<li>"+processInline(line.replace(/^\d+\.\s/,""))+"</li>";continue;
    }

    // 无序列表
    if(line.match(/^[-*]\s/)){
      if(!inList||listType!=="ul"){if(inList)html+=listType==="ol"?"</ol>":"</ul>";html+="<ul>";inList=true;listType="ul"}
      html+="<li>"+processInline(line.replace(/^[-*]\s/,""))+"</li>";continue;
    }

    // 空行
    if(!line.trim()){
      if(inList){html+=listType==="ol"?"</ol>":"</ul>";inList=false}
      continue;
    }

    // 普通段落
    if(inList){html+=listType==="ol"?"</ol>":"</ul>";inList=false}
    html+="<p>"+processInline(line)+"</p>";
  }
  if(inList)html+=listType==="ol"?"</ol>":"</ul>";
  return html;
}

function processInline(text){
  // 粗体
  text=text.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  // 斜体
  text=text.replace(/\*(.+?)\*/g,"<em>$1</em>");
  // 行内代码
  text=text.replace(/`(.+?)`/g,"<code>$1</code>");
  return text;
}

// 上传视频片段
async function uploadClips(files){
  if(!files||!files.length)return;
  if(!currentProdId){toast("请先打开一个方案","tge");return}

  var prog=document.getElementById("uploadProgress");
  prog.style.display="block";
  var total=files.length,done=0,errors=0;

  for(var i=0;i<files.length;i++){
    var f=files[i];
    var ext=f.name.split(".").pop().toLowerCase();
    var filePath=currentProdId+"/clip_"+Date.now()+"_"+i+"."+ext;

    prog.innerHTML='<div style="padding:6px 10px;border-radius:6px;background:var(--sky-light);font-size:11px;color:var(--sky-text)">上传中: '+(i+1)+'/'+total+' — '+f.name+'</div>';

    try{
      // 上传到 Supabase Storage
      var ur=await fetch(U+"/storage/v1/object/production-clips/"+filePath,{
        method:"POST",
        headers:{"apikey":K,"Content-Type":f.type||"video/mp4","x-upsert":"true"},
        body:f
      });
      if(!ur.ok)throw new Error(await ur.text());

      // 创建数据库记录
      var clipData={
        production_id:currentProdId,
        clip_name:f.name,
        clip_order:done,
        file_path:filePath,
        file_size:f.size,
        mime_type:f.type||"video/mp4"
      };
      await fetch(qa("production_clips"),{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify(clipData)});

      done++;
    }catch(e){
      errors++;
      console.error("上传失败:",f.name,e);
    }
  }

  // 更新方案的clip_count
  await fetch(qa("productions","id=eq."+currentProdId),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({clip_count:done,status:"clips_uploaded"})});

  prog.innerHTML='<div style="padding:6px 10px;border-radius:6px;background:var(--emerald-light);font-size:11px;color:var(--emerald-text)">上传完成: '+done+'个成功'+(errors?' , '+errors+'个失败':'')+'</div>';
  toast("上传完成！"+done+"个片段","tgs");

  // 刷新详情
  setTimeout(function(){openProduction(currentProdId)},500);
}

async function deleteClip(clipId,filePath){
  if(!confirm("确定删除这个片段？"))return;
  try{
    // 删除Storage文件
    await fetch(U+"/storage/v1/object/production-clips/"+filePath,{method:"DELETE",headers:{"apikey":K}});
    // 删除数据库记录
    await fetch(qa("production_clips","id=eq."+clipId),{method:"DELETE",headers:{"apikey":K}});
    toast("已删除","tgs");
    openProduction(currentProdId);
  }catch(e){toast("删除失败","tge")}
}

async function doCreateModel(){
  var fashnKey=localStorage.getItem("fashn_api_key")||"";
  var prompt=document.getElementById("modelCreatePrompt").value;
  if(!prompt){toast("请输入模特描述","tge");return}

  var prog=document.getElementById("modelCreateProgress");
  prog.style.display="block";
  prog.innerHTML=progBox("🤖 正在生成AI模特...",0,1);

  try{
    var resp=await fetch("https://api.fashn.ai/v1/run",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+fashnKey},
      body:JSON.stringify({model_name:"model-create",inputs:{prompt:prompt}})
    });
    if(!resp.ok)throw new Error("FASHN "+(await resp.text()).substring(0,100));
    var data=await resp.json();
    var predId=data.id;

    prog.innerHTML=progBox("🤖 AI模特生成中，约10-20秒...",0,1);

    var resultUrl="";
    for(var i=0;i<60;i++){
      await sleep(3000);
      var sr=await fetch("https://api.fashn.ai/v1/status/"+predId,{headers:{"Authorization":"Bearer "+fashnKey}});
      var sd=await sr.json();
      if(sd.status==="completed"&&sd.output&&sd.output.length){resultUrl=sd.output[0];break}
      if(sd.status==="failed")throw new Error(sd.error||"生成失败");

// ===== FFmpeg.wasm 浏览器端视频拼接 =====
var ffmpegInstance=null;
var ffmpegLoaded=false;

async function loadFFmpegWasm(){
  if(ffmpegLoaded&&ffmpegInstance)return ffmpegInstance;
  // 动态加载ffmpeg.wasm（单线程版，兼容GitHub Pages）
  if(!window.FFmpegWASM){
    await new Promise(function(resolve,reject){
      var s=document.createElement("script");
      s.src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js";
      s.onload=resolve;s.onerror=reject;
      document.head.appendChild(s);
    });
    await new Promise(function(resolve,reject){
      var s=document.createElement("script");
      s.src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js";
      s.onload=resolve;s.onerror=reject;
      document.head.appendChild(s);
    });
  }
  var FFmpeg=window.FFmpegWASM||window.FFmpeg;
  if(!FFmpeg||!FFmpeg.FFmpeg)throw new Error("FFmpeg.wasm加载失败");
  ffmpegInstance=new FFmpeg.FFmpeg();
  ffmpegInstance.on("log",function(e){console.log("[ffmpeg]",e.message)});
  await ffmpegInstance.load({
    coreURL:"https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js",
    wasmURL:"https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm"
  });
  ffmpegLoaded=true;
  return ffmpegInstance;
}

async function ffmpegMerge(videoUrls,subtitles,progEl){
  progEl.innerHTML=progBox("🔧 加载FFmpeg引擎(~22MB，首次较慢)...",0,3);

  var ffmpeg=await loadFFmpegWasm();
  var fetchFile=window.FFmpegUtil?window.FFmpegUtil.fetchFile:async function(url){var r=await fetch(url);return new Uint8Array(await r.arrayBuffer())};

  // 下载所有视频片段到FFmpeg虚拟文件系统
  progEl.innerHTML=progBox("🔧 下载视频片段...",1,3);
  var fileList="";
  for(var i=0;i<videoUrls.length;i++){
    var fname="clip_"+i+".mp4";
    try{
      var data=await fetchFile(videoUrls[i]);
      await ffmpeg.writeFile(fname,data);
      fileList+="file '"+fname+"'\n";
    }catch(dlErr){
      console.error("下载片段"+i+"失败:",dlErr);
    }
  }
  if(!fileList)throw new Error("没有可拼接的片段");

  // 写入拼接列表
  var encoder=new TextEncoder();
  await ffmpeg.writeFile("list.txt",encoder.encode(fileList));

  // 生成SRT字幕文件
  if(subtitles&&subtitles.length){
    var totalDuration=videoUrls.length*5; // 每段约5秒
    var subDur=totalDuration/subtitles.length;
    var srt="";
    subtitles.forEach(function(txt,idx){
      var startSec=idx*subDur;
      var endSec=(idx+1)*subDur;
      srt+=(idx+1)+"\n"+formatSrtTime(startSec)+" --> "+formatSrtTime(endSec)+"\n"+txt+"\n\n";
    });
    await ffmpeg.writeFile("subs.srt",encoder.encode(srt));
  }

  // 执行FFmpeg拼接命令
  progEl.innerHTML=progBox("🔧 拼接视频"+(subtitles.length?"+烧字幕":"")+"...",2,3);

  if(subtitles&&subtitles.length){
    // 拼接+烧字幕
    await ffmpeg.exec([
      "-f","concat","-safe","0","-i","list.txt",
      "-vf","subtitles=subs.srt:force_style='FontSize=18,PrimaryColour=&H00FFFFFF,OutlineColour=&H00000000,Outline=2,Alignment=2,MarginV=40'",
      "-c:v","libx264","-preset","ultrafast","-c:a","aac",
      "-y","output.mp4"
    ]);
  }else{
    // 仅拼接
    await ffmpeg.exec([
      "-f","concat","-safe","0","-i","list.txt",
      "-c","copy","-y","output.mp4"
    ]);
  }

  // 读取输出文件
  var outputData=await ffmpeg.readFile("output.mp4");
  var blob=new Blob([outputData.buffer],{type:"video/mp4"});
  var outputUrl=URL.createObjectURL(blob);

  // 同时提供下载
  var a=document.createElement("a");a.href=outputUrl;
  a.download="tiktok_final_"+Date.now()+".mp4";
  document.body.appendChild(a);a.click();a.remove();

  // 清理虚拟文件系统
  for(var ci=0;ci<videoUrls.length;ci++){
    try{await ffmpeg.deleteFile("clip_"+ci+".mp4")}catch(e){}
  }
  try{await ffmpeg.deleteFile("list.txt")}catch(e){}
  try{await ffmpeg.deleteFile("subs.srt")}catch(e){}
  try{await ffmpeg.deleteFile("output.mp4")}catch(e){}

  return outputUrl;
}

function formatSrtTime(sec){
  var h=Math.floor(sec/3600);
  var m=Math.floor((sec%3600)/60);
  var s=Math.floor(sec%60);
  var ms=Math.round((sec%1)*1000);
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+","+String(ms).padStart(3,"0");
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function progBox(msg,current,total){
  var pct=total==="done"?100:(total?Math.round(current/total*100):0);
  return '<div style="padding:8px;background:var(--sky-light);border-radius:6px;font-size:11px;color:var(--sky-text)"><div style="margin-bottom:4px">'+msg+'</div><div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--indigo);border-radius:2px;transition:width .3s"></div></div></div>';
}

async function doCompose(mode){
  var btn=document.getElementById("composeBtn");
  btn.disabled=true;btn.textContent="处理中...";
  var prog=document.getElementById("composeProgress");
  prog.style.display="block";

  var fashnKey=document.getElementById("composeFashnKey")?document.getElementById("composeFashnKey").value:"";
  var falKey=document.getElementById("composeFalKey")?document.getElementById("composeFalKey").value:"";

  var cr=await fetch(qa("production_clips","production_id=eq."+currentProdId+"&order=clip_order.asc"));
  var clips=await cr.json();

  try{
    var imageUrls=[];

    // ===== 步骤1: FASHN 假模→真人 =====

      if(!fashnKey){throw new Error("请输入 FASHN API Key")}

      // 读取品牌模特和FASHN提示词
      var brandModelUrl=localStorage.getItem("brand_model_url")||"";
      var fashnPrompt=document.getElementById("composeFashnPrompt")?document.getElementById("composeFashnPrompt").value:"";

      for(var i=0;i<clips.length;i++){
        var clipUrl=U+"/storage/v1/object/public/production-clips/"+clips[i].file_path;
        prog.innerHTML=progBox("👗 FASHN换真人: "+(i+1)+"/"+clips.length,i,clips.length);

        try{
          var fashnInputs={product_image:clipUrl,prompt:fashnPrompt||"Full body, professional fashion model wearing this clothing, studio lighting, clean white background"};
          // 如果设置了品牌模特，使用try-on模式（把衣服穿到指定模特身上）
          if(brandModelUrl){
            fashnInputs.model_image=brandModelUrl;
          }
          var fResp=await fetch("https://api.fashn.ai/v1/run",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":"Bearer "+fashnKey},
            body:JSON.stringify({model_name:brandModelUrl?"tryon-v1.6":"product-to-model",inputs:fashnInputs})
          });
          if(!fResp.ok)throw new Error("FASHN "+(await fResp.text()).substring(0,100));
          var fData=await fResp.json();
          var predId=fData.id;

          var modelImg="";
          for(var fi=0;fi<60;fi++){
            await sleep(3000);
            var sResp=await fetch("https://api.fashn.ai/v1/status/"+predId,{headers:{"Authorization":"Bearer "+fashnKey}});
            var sData=await sResp.json();
            if(sData.status==="completed"&&sData.output&&sData.output.length){modelImg=sData.output[0];break}
            if(sData.status==="failed")throw new Error(sData.error||"FASHN处理失败");
          }
          if(!modelImg)throw new Error("FASHN超时");
          imageUrls.push(modelImg);
        }catch(fe){
          console.error("FASHN片段"+(i+1)+"失败:",fe.message);
          imageUrls.push(clipUrl);
        }
      }
      prog.innerHTML=progBox("✅ FASHN完成! "+imageUrls.length+"张真人图",clips.length,clips.length);

      if(mode==="fashn_only"){
        await saveComposeOutput(imageUrls.join("\n"),subtitles,"fashn","假模→真人");
        prog.innerHTML=progBox("✅ 完成！真人穿着图已生成","done","done");
        toast("真人模特图已生成！","tgs");
        setTimeout(function(){composeMO.style.display="none";openProduction(currentProdId)},1500);
        return;
      }
    }else{
      clips.forEach(function(c){imageUrls.push(U+"/storage/v1/object/public/production-clips/"+c.file_path)});
    }

    // ===== 步骤2: fal.ai Seedance 图→视频 =====
    if(mode==="full"||mode==="video_only"){
      if(!falKey){throw new Error("请输入 fal.ai API Key")}
      prog.innerHTML=progBox("🎬 Seedance: 准备生成"+imageUrls.length+"条视频...",0,imageUrls.length);
      var videoUrls=[];

      for(var vi=0;vi<imageUrls.length;vi++){
        prog.innerHTML=progBox("🎬 Seedance生成: "+(vi+1)+"/"+imageUrls.length,vi,imageUrls.length);

        try{
          // ===== 提交任务：优先走 Supabase RPC 代理（解决CORS），失败则直连 =====
          var reqId="";
          var useProxy=true;
          try{
            var submitResp=await fetch(U+"/rest/v1/rpc/fal_seedance_submit",{
              method:"POST",headers:{"Content-Type":"application/json","apikey":K},
              body:JSON.stringify({p_fal_key:falKey,p_image_url:imageUrls[vi],p_prompt:prompt||"Fashion model showcasing clothing",p_aspect_ratio:"9:16",p_duration:"5"})
            });
            if(!submitResp.ok){
              var errT=await submitResp.text();
              if(errT.includes("does not exist")||errT.includes("could not find")){useProxy=false}
              else{throw new Error("代理提交失败: "+errT.substring(0,100))}
            }else{
              var submitResult=await submitResp.json();
              if(submitResult.success&&submitResult.data){reqId=submitResult.data.request_id||""}
              else if(submitResult.request_id){reqId=submitResult.request_id}
              else{throw new Error("代理返回异常: "+JSON.stringify(submitResult).substring(0,150))}
            }
          }catch(proxyErr){
            console.warn("RPC代理不可用，尝试直连fal.ai:",proxyErr.message);
            useProxy=false;
          }

          // 直连模式（RPC代理不存在时回退）
          if(!useProxy||!reqId){
            prog.innerHTML=progBox("🎬 Seedance(直连): "+(vi+1)+"/"+imageUrls.length,vi,imageUrls.length);
            var vResp=await fetch("https://queue.fal.run/fal-ai/bytedance/seedance/v1/lite/image-to-video",{
              method:"POST",
              headers:{"Authorization":"Key "+falKey,"Content-Type":"application/json"},
              body:JSON.stringify({prompt:prompt||"Fashion model showcasing clothing",image_url:imageUrls[vi],aspect_ratio:"9:16",duration:"5"})
            });
            var vRespText=await vResp.text();
            if(!vResp.ok)throw new Error("fal.ai "+vRespText.substring(0,200));
            if(!vRespText||!vRespText.trim())throw new Error("fal.ai 返回空响应，请检查API Key");
            var vData;try{vData=JSON.parse(vRespText)}catch(je){throw new Error("fal.ai 返回非JSON: "+vRespText.substring(0,100))}
            reqId=vData.request_id;
          }
          if(!reqId)throw new Error("未获取到request_id");

          // ===== 轮询状态 =====
          var videoUrl="";
          for(var pi=0;pi<120;pi++){
            await sleep(3000);
            var psData=null;
            try{
              if(useProxy){
                var psResp=await fetch(U+"/rest/v1/rpc/fal_seedance_status",{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({p_fal_key:falKey,p_request_id:reqId})});
                psData=await psResp.json();
              }else{
                var psResp2=await fetch("https://queue.fal.run/fal-ai/bytedance/seedance/v1/lite/image-to-video/requests/"+reqId+"/status",{headers:{"Authorization":"Key "+falKey}});
                var psText=await psResp2.text();
                if(!psText||!psText.trim()){continue}
                try{psData=JSON.parse(psText)}catch(je2){continue}
              }
            }catch(pollErr){console.warn("轮询出错，重试:",pollErr.message);continue}
            if(!psData||!psData.status)continue;

            var elapsed=pi*3;var mins=Math.floor(elapsed/60);var secs=elapsed%60;
            var timeStr=mins>0?mins+"分"+secs+"秒":secs+"秒";
            prog.innerHTML=progBox("🎬 Seedance: "+(vi+1)+"/"+imageUrls.length+" "+psData.status+" ("+timeStr+")",vi,imageUrls.length);

            if(psData.status==="COMPLETED"){
              try{
                var vrData=null;
                if(useProxy){
                  var vrResp=await fetch(U+"/rest/v1/rpc/fal_seedance_result",{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({p_fal_key:falKey,p_request_id:reqId})});
                  vrData=await vrResp.json();
                }else{
                  var vrResp2=await fetch("https://queue.fal.run/fal-ai/bytedance/seedance/v1/lite/image-to-video/requests/"+reqId,{headers:{"Authorization":"Key "+falKey}});
                  var vrText=await vrResp2.text();
                  if(vrText&&vrText.trim())try{vrData=JSON.parse(vrText)}catch(je3){}
                }
                if(vrData&&vrData.video&&vrData.video.url){videoUrl=vrData.video.url;break}
              }catch(resErr){console.warn("获取结果出错:",resErr.message);continue}
            }
            if(psData.status==="FAILED"){var failMsg=psData.error||psData.detail||psData.message||"Seedance生成失败";throw new Error(failMsg)}
          }
          if(!videoUrl)throw new Error("Seedance超时（等待"+Math.round(pi*3/60)+"分钟）");
          videoUrls.push(videoUrl);
        }catch(ve){
          console.error("Seedance "+(vi+1)+"失败:",ve.message);
          toast("视频"+(vi+1)+"失败: "+ve.message,"tge");
        }
      }

      if(videoUrls.length){
        // ===== 步骤3: FFmpeg.wasm 拼接+字幕 =====
        if(videoUrls.length>1||subtitles.length){
          prog.innerHTML=progBox("🔧 FFmpeg: 拼接视频+烧字幕...",0,1);
          try{
            var mergedUrl=await ffmpegMerge(videoUrls,subtitles,prog);
            if(mergedUrl){
              await saveComposeOutput(mergedUrl,subtitles,"fashn+seedance+ffmpeg",prompt);
              prog.innerHTML=progBox("✅ 完成! 视频已拼接+字幕","done","done");
              toast("AI合成完成! 视频已拼接","tgs");
            }else{throw new Error("拼接失败")}
          }catch(mergeErr){
            console.error("FFmpeg拼接失败，保存独立片段:",mergeErr);
            await saveComposeOutput(videoUrls.join("\n"),subtitles,"fashn+seedance",prompt);
            prog.innerHTML=progBox("⚠️ 拼接失败，已保存"+videoUrls.length+"条独立视频","done","done");
            toast("视频已生成（拼接失败，已保存独立片段）","tgs");
          }
        }else{
          await saveComposeOutput(videoUrls[0],subtitles,"fashn+seedance",prompt);
          prog.innerHTML=progBox("✅ 完成! 1条视频已生成","done","done");
          toast("AI合成完成!","tgs");
        }
      }else{throw new Error("所有视频均失败")}
    }
    setTimeout(function(){composeMO.style.display="none";openProduction(currentProdId)},2000);
  }catch(e){
    prog.innerHTML='<div style="padding:8px;background:var(--rose-light);border-radius:6px;font-size:11px;color:var(--rose-text)">❌ '+e.message+'</div>';
  }finally{btn.disabled=false;btn.textContent="开始合成"}
}

async function exportToCapcut(){
  if(!currentProdId)return;
  try{
    // 获取方案详情
    var pr=await fetch(qa("productions","id=eq."+currentProdId));
    var prod=(await pr.json())[0];

    if(!clips.length){toast("请先上传拍摄素材","tge");return}

    var draft=buildCapcutDraft(prod,clips,mat);
    var blob=new Blob([JSON.stringify(draft,null,2)],{type:"application/json"});
    var url2=URL.createObjectURL(blob);
    var a=document.createElement("a");

function buildCapcutDraft(prod,clips,mat){
  var fps=30;
  var tracks=[];var currentTime=0;

  // 视频轨道
  var videoSegments=[];
  clips.forEach(function(c,i){
    var dur=(c.duration_seconds||5)*1000000; // 微秒
    videoSegments.push({
      material_id:"video_"+i,
      target_timerange:{start:currentTime,duration:dur},
      source_timerange:{start:0,duration:dur},
      speed:1.0
    });
    currentTime+=dur;
  });
  tracks.push({type:"video",segments:videoSegments});

  // 字幕轨道（从钩子+痛点+促单生成）
  var subtitles=[];var subTime=0;
  var allTexts=[];
  if(mat.stop)mat.stop.forEach(function(s){allTexts.push(s.text)});
  if(mat.pain)mat.pain.forEach(function(p2){allTexts.push(p2.pain||p2.scene)});
  if(mat.buy)mat.buy.forEach(function(b){allTexts.push(b.text)});

  var subDur=allTexts.length?Math.floor(currentTime/allTexts.length):currentTime;
  allTexts.forEach(function(txt,i){
    subtitles.push({
      material_id:"text_"+i,
      content:txt||"",
      target_timerange:{start:subDur*i,duration:subDur}
    });
  });
  if(subtitles.length)tracks.push({type:"text",segments:subtitles});

  // BGM轨道
  if(mat.bgm&&mat.bgm.length){
    tracks.push({type:"audio",segments:[{
      material_id:"bgm_0",
      bgm_name:mat.bgm[0].name||"BGM",
      target_timerange:{start:0,duration:currentTime}
    }]});
  }

  return {
    id:prod.id,
    name:prod.title||"TikTok视频",
    width:1080,height:1920,fps:fps,
    duration:currentTime,
    tracks:tracks,
    materials:{
      videos:clips.map(function(c,i){return {id:"video_"+i,path:c.clip_name||"clip_"+i+".mp4",type:"video"}}),
      texts:allTexts.map(function(t,i){return {id:"text_"+i,content:t}}),
      audios:mat.bgm?mat.bgm.map(function(b,i){return {id:"bgm_"+i,name:b.name||"BGM"}}):[],
    },
    _note:"将此文件放入剪映草稿目录（如 ~/Movies/JianyingPro/User Data/Projects/com.lveditor.draft/）中对应文件夹的 draft_content.json"
  };
}

    if(!clips.length){toast("请先上传拍摄素材","tge");return}

    var xml=buildFCPXML(prod,clips,mat);

    var url2=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url2;a.download=(prod.title||"tiktok_project").replace(/\s/g,"_")+".xml";
    document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url2);
    toast("PR工程XML已下载！在Premiere中 文件→导入 打开","tgs");
  }catch(e){toast("导出失败: "+e.message,"tge")}
}

function buildFCPXML(prod,clips,mat){
  var fps=30;var totalFrames=0;
  clips.forEach(function(c){totalFrames+=(c.duration_seconds||5)*fps});

  var xml='<?xml version="1.0" encoding="UTF-8"?>\n';
  xml+='<!DOCTYPE xmeml>\n<xmeml version="5">\n<project>\n';
  xml+='<name>'+(prod.title||"TikTok Video")+'</name>\n';
  xml+='<children>\n';

  // Bin with clips
  xml+='<bin><name>素材</name><children>\n';
  clips.forEach(function(c,i){
    var dur=Math.round((c.duration_seconds||5)*fps);
    var fileUrl=U+"/storage/v1/object/public/production-clips/"+c.file_path;
    xml+='<clip id="clip-'+i+'">\n';
    xml+='<name>'+(c.clip_name||"clip_"+(i+1))+'</name>\n';
    xml+='<duration>'+dur+'</duration>\n';
    xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>\n';
    xml+='<file id="file-'+i+'"><name>'+(c.clip_name||"clip_"+(i+1))+'</name>';
    xml+='<pathurl>'+fileUrl+'</pathurl>';
    xml+='<duration>'+dur+'</duration>';
    xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>';
    xml+='<media><video><duration>'+dur+'</duration>';
    xml+='<samplecharacteristics><width>1080</width><height>1920</height></samplecharacteristics>';
    xml+='</video></media></file>\n';
    xml+='</clip>\n';
  });
  xml+='</children></bin>\n';

  // Sequence
  xml+='<sequence>\n<name>'+(prod.title||"主序列")+'</name>\n';
  xml+='<duration>'+totalFrames+'</duration>\n';
  xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>\n';
  xml+='<media>\n<video>\n<format>\n<samplecharacteristics>\n';
  xml+='<width>1080</width><height>1920</height>\n';
  xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>\n';
  xml+='</samplecharacteristics>\n</format>\n';

  // Video track
  xml+='<track>\n';
  var currentFrame=0;
  clips.forEach(function(c,i){
    var dur=Math.round((c.duration_seconds||5)*fps);
    xml+='<clipitem id="seq-clip-'+i+'">\n';
    xml+='<name>'+(c.clip_name||"clip_"+(i+1))+'</name>\n';
    xml+='<duration>'+dur+'</duration>\n';
    xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>\n';
    xml+='<start>'+currentFrame+'</start>\n';
    xml+='<end>'+(currentFrame+dur)+'</end>\n';
    xml+='<in>0</in><out>'+dur+'</out>\n';
    xml+='<file id="file-'+i+'"/>\n';
    xml+='</clipitem>\n';
    currentFrame+=dur;
  });
  xml+='</track>\n';

  // Subtitle track (generatoritem)
  var allTexts=[];
  if(mat.stop)mat.stop.forEach(function(s){allTexts.push(s.text)});
  if(mat.pain)mat.pain.forEach(function(p2){allTexts.push(p2.pain||p2.scene)});
  if(mat.buy)mat.buy.forEach(function(b){allTexts.push(b.text)});

  if(allTexts.length){
    xml+='<track>\n';
    var subDurF=Math.floor(totalFrames/allTexts.length);
    allTexts.forEach(function(txt,i){
      xml+='<generatoritem id="sub-'+i+'">\n';
      xml+='<name>'+( txt||"字幕")+'</name>\n';
      xml+='<duration>'+subDurF+'</duration>\n';
      xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>\n';
      xml+='<start>'+(subDurF*i)+'</start>\n';
      xml+='<end>'+(subDurF*(i+1))+'</end>\n';
      xml+='<in>0</in><out>'+subDurF+'</out>\n';
      xml+='<effect><name>Text</name><effectid>Text</effectid><effecttype>generator</effecttype>';
      xml+='<parameter><parameterid>str</parameterid><name>Text</name><value>'+(txt||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")+'</value></parameter>';
      xml+='</effect>\n</generatoritem>\n';
    });
    xml+='</track>\n';
  }

  xml+='</video>\n';

  // Audio track
  xml+='<audio>\n<track>\n';
  currentFrame=0;
  clips.forEach(function(c,i){
    var dur=Math.round((c.duration_seconds||5)*fps);
    xml+='<clipitem id="seq-audio-'+i+'">\n';
    xml+='<name>'+(c.clip_name||"clip_"+(i+1))+'</name>\n';
    xml+='<duration>'+dur+'</duration>\n';
    xml+='<rate><timebase>'+fps+'</timebase><ntsc>FALSE</ntsc></rate>\n';
    xml+='<start>'+currentFrame+'</start><end>'+(currentFrame+dur)+'</end>\n';
    xml+='<in>0</in><out>'+dur+'</out>\n';
    xml+='<file id="file-'+i+'"/>\n';
    xml+='</clipitem>\n';
    currentFrame+=dur;
  });
  xml+='</track>\n</audio>\n';

  xml+='</media>\n</sequence>\n';
  xml+='</children>\n</project>\n</xmeml>';
  return xml;
}

// 下载AI生成的图片/视频文件
async function downloadAIFile(url,label){
  try{
    toast("正在下载...","tgs");
    var resp=await fetch(url);
    if(!resp.ok)throw new Error("下载失败: HTTP "+resp.status);
    var blob=await resp.blob();
    // 根据内容类型确定扩展名
    var ct2=resp.headers.get("content-type")||"";
    var ext="bin";
    if(ct2.includes("image/png"))ext="png";
    else if(ct2.includes("image/jpeg")||ct2.includes("image/jpg"))ext="jpg";
    else if(ct2.includes("image/webp"))ext="webp";
    else if(ct2.includes("video/mp4"))ext="mp4";
    else if(ct2.includes("video/webm"))ext="webm";
    else{
      // 从URL猜扩展名
      var urlExt=url.split("?")[0].split(".").pop().toLowerCase();
      if(["png","jpg","jpeg","webp","mp4","mov","webm"].indexOf(urlExt)!==-1)ext=urlExt;
      else if(ct2.includes("video"))ext="mp4";
      else if(ct2.includes("image"))ext="png";
    }
    var fileName=(label||"ai_output").replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g,"_")+"_"+Date.now()+"."+ext;
    var dlUrl=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=dlUrl;a.download=fileName;
    document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(dlUrl);
    toast("下载完成: "+fileName,"tgs");
  }catch(e){
    // 回退：直接在新标签页打开
    toast("自动下载失败，已在新窗口打开","tge");
    window.open(url,"_blank");
  }
}

// OpenAI API Key 存储
function getOpenAIKey(){return localStorage.getItem("openai_api_key")||""}
function setOpenAIKey(key){localStorage.setItem("openai_api_key",key)}

// 提取单条视频台词
async function extractTranscript(videoId){
  var apiKey=getOpenAIKey();
  if(!apiKey){
    showWhisperKeyModal(function(){extractTranscript(videoId)});
    return;
  }

  var row=allRows.find(function(r){return r.id===videoId});
  if(!row){toast("未找到视频数据","tge");return}

  var audioUrl=row.video_play_url||"";
  if(!audioUrl){toast("该视频无播放地址，无法提取","tge");return}

  // 标记为处理中
  await fetch(qa("trending_videos","id=eq."+videoId),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({transcript_status:"processing"})});
  row.transcript_status="processing";
  document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows));
  restoreFilters();
  toast("🎙 正在提取台词...（约15-30秒）","tgs");

  try{
    // 步骤1：下载视频音频
    var audioResp=await fetch(audioUrl);
    if(!audioResp.ok){
      // CORS限制时尝试通过Supabase代理
      audioResp=await fetch(U+"/rest/v1/rpc/proxy_download",{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({p_url:audioUrl})});
      if(!audioResp.ok)throw new Error("无法下载视频音频（可能有CORS限制）");
    }
    var audioBlob=await audioResp.blob();
    // 限制25MB
    if(audioBlob.size>25*1024*1024)throw new Error("视频文件过大（>25MB），请尝试较短的视频");

    // 步骤2：发送给 OpenAI Whisper API 转文字
    var formData=new FormData();
    formData.append("file",audioBlob,"video.mp4");
    formData.append("model","whisper-1");
    formData.append("response_format","json");
    formData.append("language","en");

    var whisperResp=await fetch("https://api.openai.com/v1/audio/transcriptions",{
      method:"POST",
      headers:{"Authorization":"Bearer "+apiKey},
      body:formData
    });
    if(!whisperResp.ok){
      var errText=await whisperResp.text();
      if(errText.includes("invalid_api_key")){
        localStorage.removeItem("openai_api_key");
        throw new Error("OpenAI API Key 无效，请重新设置");
      }
      throw new Error("Whisper API: "+errText.substring(0,150));
    }
    var whisperResult=await whisperResp.json();
    var transcriptEn=whisperResult.text||"";

    if(!transcriptEn.trim()){
      await fetch(qa("trending_videos","id=eq."+videoId),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({transcript_status:"done",transcript_en:"(无语音内容)",transcript_cn:"(无语音内容)"})});
      row.transcript_status="done";row.transcript_en="(无语音内容)";row.transcript_cn="(无语音内容)";
      toast("该视频没有语音内容","tgs");
      document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows));restoreFilters();
      return;
    }

    // 步骤3：用 OpenAI 翻译成中文
    var translateResp=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"Authorization":"Bearer "+apiKey,"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[{role:"user",content:"请将以下TikTok视频台词翻译成中文，保持口语化风格，直接输出翻译结果：\n\n"+transcriptEn}],
        max_tokens:2000
      })
    });
    var transcriptCn="";
    if(translateResp.ok){
      var tlResult=await translateResp.json();
      transcriptCn=(tlResult.choices&&tlResult.choices[0]&&tlResult.choices[0].message&&tlResult.choices[0].message.content)||"";
    }

    // 步骤4：保存到数据库
    await fetch(qa("trending_videos","id=eq."+videoId),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({
      transcript_en:transcriptEn,
      transcript_cn:transcriptCn||transcriptEn,
      transcript_status:"done"
    })});

    row.transcript_en=transcriptEn;
    row.transcript_cn=transcriptCn||transcriptEn;
    row.transcript_status="done";
    toast("✅ 台词提取完成！","tgs");
  }catch(e){
    console.error("台词提取失败:",e);
    await fetch(qa("trending_videos","id=eq."+videoId),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({transcript_status:"failed"})});
    row.transcript_status="failed";
    toast("台词提取失败: "+e.message,"tge");
  }

  document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows));
  restoreFilters();setTimeout(triggerPageTranslation,50);
}

// ==================== 英文内容实时翻译 ====================
// 需要翻译的字段：英文内容在显示时自动加中文翻译
var TRANSLATE_FIELDS=["title","comment_en","script_en","hook_script","music_title","bgm_title"];
// 翻译缓存（避免重复翻译）
var transCache={};

function isEnglish(text){
  if(!text||typeof text!=="string")return false;
  // 如果超过40%是ASCII字母，判定为英文
  var ascii=0;for(var i=0;i<text.length;i++){var c=text.charCodeAt(i);if((c>=65&&c<=90)||(c>=97&&c<=122))ascii++}
  return ascii/text.length>0.4;
}

// 批量翻译：收集页面上所有需要翻译的元素一次性翻译
var translateQueue=[];
var translateTimer=null;

function queueTranslation(el,text){
  if(!text||!isEnglish(text))return;
  var key=text.substring(0,200).trim();
  if(transCache[key]){
    el.insertAdjacentHTML("afterend",'<div class="trans-row">🇨🇳 '+transCache[key]+'</div>');
    return;
  }
  el.insertAdjacentHTML("afterend",'<div class="trans-loading" data-trans-key="'+btoa(encodeURIComponent(key)).substring(0,40)+'">翻译中...</div>');
  translateQueue.push({el:el,text:key,loadingKey:btoa(encodeURIComponent(key)).substring(0,40)});
  // 延迟100ms收集同批次翻译
  if(translateTimer)clearTimeout(translateTimer);
  translateTimer=setTimeout(flushTranslations,150);
}

async function flushTranslations(){
  var batch=translateQueue.splice(0,20); // 每批最多20条
  if(!batch.length)return;
  // 去重
  var unique={};batch.forEach(function(item){
    if(!unique[item.text])unique[item.text]=[];
    unique[item.text].push(item);
  });
  var texts=Object.keys(unique);
  if(!texts.length)return;

  try{
    // 调用Supabase Edge Function或直接用简单的翻译RPC
    // 优先使用已有的Claude API通过Supabase pg_net
    var prompt="Translate each English text to Chinese. Return ONLY a JSON array of translations in the same order. No explanation.\n\n"+texts.map(function(t,i){return (i+1)+". "+t}).join("\n");

    var resp=await fetch(U+"/rest/v1/rpc/translate_texts",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":K},
      body:JSON.stringify({texts_json:JSON.stringify(texts)})
    });

    var translations=[];
    if(resp.ok){
      var result=await resp.json();
      if(Array.isArray(result)){translations=result}
      else if(result&&result.translations){translations=result.translations}
    }

    // 如果RPC不存在，回退到前端简单翻译（基于常见词汇的本地翻译）
    if(!translations.length){
      translations=texts.map(function(t){return localTranslate(t)});
    }

    // 应用翻译
    texts.forEach(function(text,i){
      var trans=translations[i]||"";
      if(trans){
        transCache[text]=trans;
        var items=unique[text]||[];
        items.forEach(function(item){
          var loadEl=document.querySelector('[data-trans-key="'+item.loadingKey+'"]');
          if(loadEl){loadEl.className="trans-row";loadEl.innerHTML="🇨🇳 "+trans}
        });
      }
    });
  }catch(e){
    console.warn("翻译失败，使用本地翻译:",e.message);
    // 回退到本地翻译
    texts.forEach(function(text){
      var trans=localTranslate(text);
      if(trans){
        transCache[text]=trans;
        var items=unique[text]||[];
        items.forEach(function(item){
          var loadEl=document.querySelector('[data-trans-key="'+item.loadingKey+'"]');
          if(loadEl){loadEl.className="trans-row";loadEl.innerHTML="🇨🇳 "+trans}
        });
      }
    });
  }
  // 如果队列中还有，继续处理
  if(translateQueue.length)setTimeout(flushTranslations,200);
}

    "under":"低于","over":"超过","from":"来自","brand":"品牌","find":"发现","found":"发现了",
    "check":"查看","look":"看","watch":"看","see":"看","try":"试","buy":"买","get":"得到",
    "wear":"穿","wearing":"穿着","wore":"穿了","buying":"购买","shopping":"购物",
    "pack":"打包","packing":"打包","clean":"清洁","cleaning":"清洁",
    "day":"日","night":"夜","week":"周","month":"月","year":"年",
    "girl":"女孩","women":"女性","men":"男性","kids":"儿童","baby":"宝宝",
    "thing":"东西","things":"东西","product":"产品","products":"产品","item":"物品","items":"物品",
    "update":"更新","recommend":"推荐","recommendation":"推荐","rating":"评分"
  };
  var lower=text.toLowerCase();
  var result=lower;
  // 按长度降序替换（先替换长词组）
  var keys=Object.keys(dict).sort(function(a,b){return b.length-a.length});
  keys.forEach(function(en){
    var re=new RegExp("\\b"+en.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","gi");
    result=result.replace(re,dict[en]);
  });
  // 清理多余空格和标点
  result=result.replace(/\s+/g," ").trim();
  // 如果翻译后跟原文差不多（大部分单词没变），说明本地词典不够用
  if(result===lower)return "";
  // 移除残余的英文定冠词等
  result=result.replace(/\b(a|an|i|in|on|at|to|of|it|do|if|up|by|or)\b/gi,"").replace(/\s+/g," ").trim();
  return result||"";
}

var curUser=null;   // {id, username, display_name, role}
var curPerms=[];    // ['material_read','material_write',...]

// SHA-256 哈希（浏览器原生）
async function sha256(text){
  var enc=new TextEncoder().encode(text);
  var hash=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
}

// 权限检查
function hasPerm(perm){
  if(!curUser)return false;
  if(curUser.role==="admin")return true;
  return curPerms.indexOf(perm)!==-1;
}

// 登录
async function doLogin(){
  var username=document.getElementById("loginUser").value.trim();
  var password=document.getElementById("loginPass").value;
  var errEl=document.getElementById("loginErr");
  var btn=document.getElementById("loginBtn");
  if(!username||!password){errEl.textContent="请输入账号和密码";return}
  btn.disabled=true;btn.textContent="登录中...";errEl.textContent="";

  try{
    var hash=await sha256(password);
    var r=await fetch(U+"/rest/v1/rpc/user_login",{
      method:"POST",headers:{"Content-Type":"application/json","apikey":K},
      body:JSON.stringify({p_username:username,p_password_hash:hash})
    });
    if(!r.ok){
      // RPC不存在时，允许免登录进入（兼容未部署auth SQL的情况）
      var errText=await r.text();
      if(errText.includes("does not exist")||errText.includes("could not find")){
        curUser={id:"local",username:"admin",display_name:"管理员(本地)",role:"admin"};
        curPerms=["all"];
        onLoginSuccess();return;
      }
      throw new Error(errText);
    }
    var result=await r.json();
    if(!result.success){errEl.textContent=result.message||"登录失败";return}

    curUser=result.user;
    curPerms=result.permissions||[];
    // 保存会话
    localStorage.setItem("auth_session",JSON.stringify({user:curUser,perms:curPerms,ts:Date.now()}));
    onLoginSuccess();
  }catch(e){errEl.textContent="登录失败: "+e.message}
  finally{btn.disabled=false;btn.textContent="登 录"}
}

function onLoginSuccess(){
  document.getElementById("loginWrap").style.display="none";
  document.getElementById("appMain").style.display="block";
  // 更新头部用户信息
  document.getElementById("userAvatar").textContent=(curUser.display_name||"U")[0];
  document.getElementById("userDisplayName").textContent=curUser.display_name||curUser.username;
  // 根据权限控制按钮显示
  applyPermissions();
  // 初始化数据
  initApp();
}

// 检查本地缓存的登录会话
function checkSession(){
  try{
    var s=localStorage.getItem("auth_session");
    if(!s)return false;
    var session=JSON.parse(s);
    // 24小时过期
    if(Date.now()-session.ts>24*3600*1000){localStorage.removeItem("auth_session");return false}
    curUser=session.user;
    curPerms=session.perms;
    return true;
  }catch(e){return false}
}

}

async function doChangePwd(){
  var oldPwd=document.getElementById("cpOldPwd").value;
  var newPwd=document.getElementById("cpNewPwd").value;
  var newPwd2=document.getElementById("cpNewPwd2").value;
  if(!oldPwd||!newPwd){toast("请填写完整","tge");return}

  if(newPwd!==newPwd2){toast("两次密码不一致","tge");return}

  try{
    var oldHash=await sha256(oldPwd);
    var newHash=await sha256(newPwd);
    // 验证原密码
    var vr=await fetch(U+"/rest/v1/rpc/user_login",{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({p_username:curUser.username,p_password_hash:oldHash})});

    document.getElementById("cpOldPwd").value="";document.getElementById("cpNewPwd").value="";document.getElementById("cpNewPwd2").value="";

}

  var password=document.getElementById("euPassword").value;
  var notes=document.getElementById("euNotes").value.trim();
  var perms=getSelectedPerms();

  try{
    var params={p_admin_id:curUser.id,p_user_id:userId,p_display_name:displayName||null,p_permissions:perms,p_notes:notes||null};
    if(password&&password.length>=6){params.p_password_hash=await sha256(password)}
    var r=await fetch(U+"/rest/v1/rpc/update_sub_user",{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify(params)});
    var result=await r.json();
    if(!result.success){toast(result.message||"更新失败","tge");return}
    toast("账号更新成功","tgs");
    document.getElementById("editUserMO").style.display="none";
    loadAdminUsers();
  }catch(e){toast("更新失败: "+e.message,"tge")}
}

async function toggleUserActive(userId,active){
  var action=active?"启用":"禁用";
  if(!confirm("确定要"+action+"这个账号吗？"))return;
  try{
    var r=await fetch(U+"/rest/v1/rpc/update_sub_user",{method:"POST",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({p_admin_id:curUser.id,p_user_id:userId,p_is_active:active})});
    var result=await r.json();
    if(!result.success){toast(result.message||action+"失败","tge");return}
    toast("已"+action,"tgs");loadAdminUsers();
  }catch(e){toast(action+"失败: "+e.message,"tge")}
}

// 重写导航分组：根据权限过滤
function getVisibleNavGroups(){
  var groups=[];
  if(hasPerm("material_read"))groups.push(NAV_GROUPS[0]);
  if(hasPerm("trending_read"))groups.push(NAV_GROUPS[1]);
  if(hasPerm("assemble_read"))groups.push(NAV_GROUPS[2]);
  if(hasPerm("production_read"))groups.push(NAV_GROUPS[3]);
  return groups;
}

  var ss=localStorage.getItem("submitter");if(ss)document.getElementById("fS").value=ss;
  document.getElementById("fS").addEventListener("change",function(){localStorage.setItem("submitter",this.value)});
  (async function(){await lC();rN();rT()})();
}
