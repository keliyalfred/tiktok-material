*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f9fafb;--surface:#fff;--surface2:#f3f4f6;--surface3:#e5e7eb;--text:#111827;--text2:#6b7280;--text3:#9ca3af;--border:#e5e7eb;--border2:#d1d5db;--indigo:#4F46E5;--indigo-light:#EEF2FF;--indigo-text:#3730A3;--emerald:#059669;--emerald-light:#ECFDF5;--emerald-text:#065F46;--rose:#E11D48;--rose-light:#FFF1F2;--rose-text:#9F1239;--sky:#0284C7;--sky-light:#F0F9FF;--sky-text:#075985;--amber:#D97706;--amber-light:#FFFBEB;--amber-text:#92400E;--violet:#7C3AED;--violet-light:#F5F3FF;--violet-text:#5B21B6;--pink:#DB2777;--pink-light:#FDF2F8;--pink-text:#9D174D;--teal:#0D9488;--teal-light:#F0FDFA;--teal-text:#115E59;--orange:#EA580C;--orange-light:#FFF7ED;--orange-text:#9A3412;--radius:10px;--radius-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04)}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.app{max-width:960px;margin:0 auto;padding:0 0 40px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:50}

.nav-item{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;border-radius:var(--radius-sm) var(--radius-sm) 0 0;flex-shrink:0}

.nav-count{font-size:11px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:10px;font-weight:600}.nav-item.active .nav-count{background:var(--indigo-light);color:var(--indigo)}

.table-title{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}.table-title .count{font-weight:400;color:var(--text3);font-size:13px}
.table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--surface2)}thead th{padding:10px 14px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface2)}

.modal-body{padding:0 24px 24px}.form-group{margin-bottom:16px}.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600}.form-label .req{color:var(--rose)}

.btn-submit{width:100%;padding:11px;border-radius:var(--radius-sm);border:none;background:var(--indigo);color:#fff;font-size:14px;font-weight:600;margin-top:8px;transition:all 0.15s;cursor:pointer}.btn-submit:hover{background:#4338CA}.btn-submit:disabled{background:var(--surface3);color:var(--text3)}.btn-submit:active:not(:disabled){background:#3730A3}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:200;animation:fadeIn 0.2s;box-shadow:0 8px 30px rgba(0,0,0,0.12)}.toast-success{background:var(--emerald);color:#fff}.toast-error{background:var(--rose);color:#fff}
@media(max-width:640px){.app{padding-bottom:20px}.header{padding:12px 16px}.nav{padding:6px 16px 0}.table-wrap{padding:12px 16px}thead th,tbody td{padding:8px 10px}.modal{max-height:90vh;border-radius:var(--radius) var(--radius) 0 0;align-self:flex-end}.modal-overlay{align-items:flex-end;padding:0}}
</style>
</head>

async function fetchCount(t){try{var r=await fetch(apiUrl(t,"select=id&limit=0"),{headers:{"Prefer":"count=exact"}});return parseInt(((r.headers.get("content-range")||"").split("/")[1])||"0")}catch(e){return 0}}
async function fetchRows(t){try{var r=await fetch(apiUrl(t,"order=created_at.desc&limit=50"));if(!r.ok)return[];return await r.json()}catch(e){return[]}}
async function renderTable(){var lib=LIBS.find(function(l){return l.key===activeTab}),cfg=FIELDS[activeTab],clr=COLORS[activeTab];document.getElementById("tableTitle").innerHTML='<span class="nav-icon" style="background:'+clr.bg+";color:"+clr.fg+';width:24px;height:24px;border-radius:6px">'+ICONS[activeTab]+"</span>"+lib.label+' <span class="count">'+(counts[activeTab]!=null?counts[activeTab]+"条":"")+"</span>";var body=document.getElementById("tableBody");body.innerHTML='<div class="loading">加载中...</div>';var rows=await fetchRows(activeTab);if(!rows.length){body.innerHTML='<div class="empty"><div class="empty-icon">'+ICONS[activeTab]+'</div><div class="empty-text">暂无数据，投入素材后 AI 会自动分发到这里</div></div>';return}var h='<table><thead><tr><th style="width:40px">#</th>';cfg.cols.forEach(function(c){h+="<th>"+cfg.labels[c]+"</th>"});h+="</tr></thead><tbody>";rows.forEach(function(r,i){h+="<tr><td style='color:var(--text3);font-size:12px'>"+(i+1)+"</td>";cfg.cols.forEach(function(c){h+="<td>"+cellVal(r,c)+"</td>"});h+="</tr>"});h+="</tbody></table>";body.innerHTML=h}
async function loadCounts(){await Promise.all(LIBS.map(async function(l){counts[l.key]=await fetchCount(l.key)}))}
async function refreshAll(){await loadCounts();renderNav();await renderTable();showToast("数据已刷新","success")}
function switchTab(k){activeTab=k;renderNav();renderTable()}
function showModal(){document.getElementById("modalOverlay").style.display="flex";setTimeout(function(){document.getElementById("fContent").focus()},100)}
function hideModal(){document.getElementById("modalOverlay").style.display="none";document.getElementById("fContent").value="";document.getElementById("fUrl").value=""}
function showToast(m,t){var c=document.getElementById("toastContainer"),e=document.createElement("div");e.className="toast toast-"+t;e.textContent=m;c.appendChild(e);setTimeout(function(){e.style.opacity="0";e.style.transition="opacity 0.3s";setTimeout(function(){e.remove()},300)},2500)}
async function submitMaterial(){var content=document.getElementById("fContent").value.trim();if(!content){showToast("请填写素材内容","error");return}var btn=document.getElementById("btnSubmit");btn.disabled=true;btn.textContent="提交中...";var data={raw_content:content},url=document.getElementById("fUrl").value.trim(),platform=document.getElementById("fPlatform").value,submitter=document.getElementById("fSubmitter").value.trim();if(url)data.source_url=url;if(platform)data.source_platform=platform;if(submitter)data.submitter=submitter;try{var r=await fetch(apiUrl("material_intake"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation"},body:JSON.stringify(data)});if(!r.ok)throw new Error(await r.text());hideModal();showToast("素材已提交，AI 正在分析中...","success");activeTab="material_intake";setTimeout(refreshAll,1000);setTimeout(refreshAll,70000)}catch(e){showToast("提交失败："+e.message,"error")}finally{btn.disabled=false;btn.textContent="提交素材 · AI 自动分发"}}
var ss=localStorage.getItem("submitter");if(ss)document.getElementById("fSubmitter").value=ss;document.getElementById("fSubmitter").addEventListener("change",function(){localStorage.setItem("submitter",this.value)});
(async function(){await loadCounts();renderNav();renderTable()})();
</script>
</body>
</html>
