var at="material_intake",ct={},allRows=[],sortDir="desc",searchTerm="",colFilter={};

function sH(s){var m={"待处理":"sp","处理中":"si","已分发":"sd","已驳回":"sr"};return '<span class="st '+(m[s]||"sp")+'"><span class="dot" style="background:currentColor"></span>'+(s||"未知")+'</span>'}

function fmtTime(t){if(!t)return "";try{var d=new Date(t);return (d.getMonth()+1)+"/"+d.getDate()+" "+d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")}catch(e){return ""}}

function starsHtml(id,val){var h='<span class="stars">';for(var i=1;i<=5;i++){h+='<span class="star'+(i<=val?" on":"")+'" onclick="setRating(\''+id+'\','+i+')">\u2605</span>'}return h+"</span>"}

function cV(r,c){
  var v=r[c];
  if(c==="sku")return v?'<span class="sku-cell">'+v+'</span>':'<span class="ce">\u2014</span>';
  if(c==="created_at")return '<span class="time-cell">'+fmtTime(v)+'</span>';
  if(c==="rating")return starsHtml(r.id,v||0);
  if(c==="user_notes")return '<input class="note-input" value="'+(v||"").replace(/"/g,"&quot;")+'" onblur="saveNote(\''+r.id+'\',this.value)" placeholder="...">';
  if(c==="source_link"){if(!v)return '<span class="ce">\u2014</span>';if(v.startsWith("http"))return '<a class="cl" href="'+v+'" target="_blank">\u67E5\u770B</a>';return '<span class="ct2" onclick="this.classList.toggle(\'expanded\')">'+v+'</span>'}
  if(v===null||v===undefined||v==="")return '<span class="ce">\u2014</span>';
  if(c==="status")return sH(v);
  if(c==="dispatched_to"){if(!Array.isArray(v)||!v.length)return '<span class="ce">\u2014</span>';return v.map(function(t){return '<span class="tag">'+(LN[t]||t)+'</span>'}).join("")}
  if(c==="source_video_url"||c==="video_url"||c==="reference_video_url")return '<a class="cl" href="'+v+'" target="_blank">\u67E5\u770B</a>';
  if(c==="view_count"||c==="like_count")return '<span class="cn">'+Number(v).toLocaleString()+'</span>';
  if(c==="difficulty"){var dc={"入门":"te","进阶":"ta","高阶":"tr"};return '<span class="tag '+(dc[v]||"")+'">'+v+'</span>'}
  if(TG[c])return '<span class="tag '+TG[c]+'">'+v+'</span>';
  return '<div class="ct2" onclick="this.classList.toggle(\'expanded\')">'+String(v)+'</div>';
}

function rN(){var h="";LL.forEach(function(k){var a=at===k?" active":"",c=ct[k]!=null?ct[k]:"\u00B7",cl=CL[k];h+='<button class="ni'+a+'" onclick="sT(\''+k+'\')"><span class="nc" style="background:'+cl.b+';color:'+cl.f+'">'+IC[k]+'</span>'+LN[k]+'<span class="nn">'+c+'</span></button>'});document.getElementById("navTabs").innerHTML=h}

async function fC(t){try{var r=await fetch(qa(t,"select=id&is_retired=eq.false&limit=0"),{headers:{"Prefer":"count=exact"}});return parseInt(((r.headers.get("content-range")||"").split("/")[1])||"0")}catch(e){return 0}}
async function fR(t){try{var o=sortDir==="asc"?"order=created_at.asc":"order=created_at.desc";var r=await fetch(qa(t,o+"&limit=100"));if(!r.ok)return[];return await r.json()}catch(e){return[]}}

function filterRows(rows){
  var res=rows;
  // 全局搜索
  if(searchTerm){var s=searchTerm.toLowerCase();res=res.filter(function(r){return Object.values(r).some(function(v){return v&&String(v).toLowerCase().indexOf(s)!==-1})})}
  // 列筛选（Excel风格：输入框模糊匹配）
  Object.keys(colFilter).forEach(function(col){
    var fv=colFilter[col];
    if(fv){
      var fvl=fv.toLowerCase();
      res=res.filter(function(r){
        var val=r[col];
        if(val===null||val===undefined)return false;
        // 数组类型（如dispatched_to）
        if(Array.isArray(val)){
          return val.some(function(item){
            var display=LN[item]||item;
            return String(display).toLowerCase().indexOf(fvl)!==-1;
          });
        }
        return String(val).toLowerCase().indexOf(fvl)!==-1;
      });
    }
  });
  // 作废的排到最后
  var active=res.filter(function(r){return !r.is_retired});
  var retired=res.filter(function(r){return r.is_retired});
  return active.concat(retired);
}

// 更新激活筛选标签栏
function updateActiveFiltersBar(){
  var cfg=FD[at];if(!cfg)return;
  var keys=Object.keys(colFilter).filter(function(k){return colFilter[k]});
  var bar=document.getElementById("activeFiltersBar");
  if(!keys.length){bar.style.display="none";return}
  var h="";
  keys.forEach(function(col){
    h+='<span class="active-filter-tag">'+cfg.n[col]+': '+colFilter[col]+' <span class="remove-filter" onclick="removeFilter(\''+col+'\')">\u00D7</span></span>';
  });
  h+='<button class="clear-all-filters" onclick="clearAllFilters()">清除全部</button>';
  bar.innerHTML=h;
  bar.style.display="flex";
}
function removeFilter(col){
  delete colFilter[col];
  // 清空对应输入框
  var inp=document.querySelector('.col-filter-input[data-col="'+col+'"]');
  if(inp){inp.value="";inp.classList.remove("has-value")}
  updateActiveFiltersBar();
  document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows));
}
function clearAllFilters(){
  colFilter={};
  document.querySelectorAll(".col-filter-input").forEach(function(inp){inp.value="";inp.classList.remove("has-value")});
  updateActiveFiltersBar();
  document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows));
}

function renderRows(rows){
  var cfg=FD[at];
  var canOp=at!=="frameworks";
  // 表头
  var h='<table><thead><tr>';
  cfg.c.forEach(function(c){h+='<th>'+cfg.n[c]+'</th>'});
  if(canOp)h+='<th>操作</th>';
  h+='</tr>';
  // === Excel风格筛选行 ===
  h+='<tr class="col-filter-row">';
  cfg.c.forEach(function(c){
    // 不对某些列加筛选
    if(c==="rating"||c==="user_notes"){
      h+='<td></td>';
    } else {
      var curVal=colFilter[c]||"";
      var hasClass=curVal?" has-value":"";
      h+='<td><input class="col-filter-input'+hasClass+'" data-col="'+c+'" value="'+curVal.replace(/"/g,"&quot;")+'" placeholder="筛选" oninput="onColFilter(this,\''+c+'\')"></td>';
    }
  });
  if(canOp)h+='<td></td>';
  h+='</tr></thead>';

  if(!rows.length)return h+'<tbody><tr><td colspan="'+(cfg.c.length+(canOp?1:0))+'" style="text-align:center;padding:40px;color:var(--text3)">'+(searchTerm||Object.keys(colFilter).length?"\u672A\u627E\u5230\u5339\u914D\u7ED3\u679C":"\u6682\u65E0\u6570\u636E")+'</td></tr></tbody></table>';

  h+='<tbody>';
  rows.forEach(function(r){
    var ret=r.is_retired;
    h+='<tr'+(ret?' class="retired"':'')+'>';
    cfg.c.forEach(function(c){h+='<td>'+cV(r,c)+'</td>'});
    // 【修复1】作废按钮：所有未作废的记录都显示，不再限制提交人
    if(canOp){
      if(!ret){
        h+='<td><button class="retire-btn" onclick="doRetire(\''+r.id+'\')">\u4F5C\u5E9F</button></td>';
      }else{
        h+='<td><span class="ce" style="font-size:10px">\u5DF2\u4F5C\u5E9F</span></td>';
      }
    }
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}

// Excel风格列筛选：输入时实时过滤
function onColFilter(el,col){
  var val=el.value.trim();
  if(val){
    colFilter[col]=val;
    el.classList.add("has-value");
  }else{
    delete colFilter[col];
    el.classList.remove("has-value");
  }
  updateActiveFiltersBar();
  // 重新渲染数据行（保留筛选输入框状态）
  var filtered=filterRows(allRows);
  var cfg=FD[at];
  var canOp=at!=="frameworks";
  var tbody=document.querySelector("#tBody table tbody");
  if(tbody){
    if(!filtered.length){
      tbody.innerHTML='<tr><td colspan="'+(cfg.c.length+(canOp?1:0))+'" style="text-align:center;padding:40px;color:var(--text3)">\u672A\u627E\u5230\u5339\u914D\u7ED3\u679C</td></tr>';
    }else{
      var bh="";
      filtered.forEach(function(r){
        var ret=r.is_retired;
        bh+='<tr'+(ret?' class="retired"':'')+'>';
        cfg.c.forEach(function(c){bh+='<td>'+cV(r,c)+'</td>'});
        if(canOp){
          if(!ret){
            bh+='<td><button class="retire-btn" onclick="doRetire(\''+r.id+'\')">\u4F5C\u5E9F</button></td>';
          }else{
            bh+='<td><span class="ce" style="font-size:10px">\u5DF2\u4F5C\u5E9F</span></td>';
          }
        }
        bh+='</tr>';
      });
      tbody.innerHTML=bh;
    }
  }else{
    // fallback: 完整重渲染
    document.getElementById("tBody").innerHTML=renderRows(filtered);
    // 恢复筛选框的值
    Object.keys(colFilter).forEach(function(c2){
      var inp2=document.querySelector('.col-filter-input[data-col="'+c2+'"]');
      if(inp2){inp2.value=colFilter[c2];inp2.classList.add("has-value")}
    });
  }
}

async function rT(){
  var clr=CL[at];
  document.getElementById("tTitle").innerHTML='<span class="nc" style="background:'+clr.b+';color:'+clr.f+';width:20px;height:20px;border-radius:4px">'+IC[at]+'</span>'+LN[at]+' <span class="ct">'+(ct[at]!=null?ct[at]+"\u6761":"")+'</span>';
  document.getElementById("sL").textContent=sortDir==="desc"?"\u6700\u65B0":"\u6700\u65E9";
  document.getElementById("sB").className="sort-btn"+(sortDir==="asc"?" active":"");
  var b=document.getElementById("tBody");
  b.innerHTML='<div class="loading">\u52A0\u8F7D\u4E2D...</div>';
  allRows=await fR(at);
  updateActiveFiltersBar();
  b.innerHTML=renderRows(filterRows(allRows));
}

function doSearch(){searchTerm=document.getElementById("sI").value.trim();document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows))}

async function doRetire(id){
  if(!confirm("确定要作废这条素材吗？作废后将灰色沉底显示。"))return;
  try{await fetch(qa(at,"id=eq."+id),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({is_retired:true})});
  toast("\u5DF2\u4F5C\u5E9F","tgs");setTimeout(refreshAll,300)}catch(e){toast("\u5931\u8D25","tge")}
}
async function setRating(id,val){
  try{await fetch(qa(at,"id=eq."+id),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({rating:val})});
  // 更新本地数据并重渲染该行的星星
  allRows.forEach(function(r){if(r.id===id)r.rating=val});
  toast("\u8BC4\u5206\u5DF2\u4FDD\u5B58","tgs")}catch(e){toast("\u8BC4\u5206\u4FDD\u5B58\u5931\u8D25","tge")}
}
async function saveNote(id,val){
  try{await fetch(qa(at,"id=eq."+id),{method:"PATCH",headers:{"Content-Type":"application/json","apikey":K},body:JSON.stringify({user_notes:val})})}catch(e){}
}

async function lC(){await Promise.all(LL.map(async function(k){ct[k]=await fC(k)}))}
async function refreshAll(){await lC();rN();await rT();toast("\u5DF2\u5237\u65B0","tgs")}
function sT(k){at=k;searchTerm="";colFilter={};document.getElementById("sI").value="";rN();rT()}
function showModal(){document.getElementById("mO").style.display="flex";setTimeout(function(){document.getElementById("fC").focus()},100)}
function hideModal(){document.getElementById("mO").style.display="none";document.getElementById("fC").value="";document.getElementById("fU").value=""}
function toast(m,t){var c=document.getElementById("toastW"),e=document.createElement("div");e.className="toast "+t;e.textContent=m;c.appendChild(e);setTimeout(function(){e.style.opacity="0";e.style.transition="opacity 0.3s";setTimeout(function(){e.remove()},300)},2000)}
async function doSubmit(){
  var content=document.getElementById("fC").value.trim();if(!content){toast("\u8BF7\u586B\u5199","tge");return}
  var btn=document.getElementById("bS");btn.disabled=true;btn.textContent="\u63D0\u4EA4\u4E2D...";
  var data={raw_content:content},url=document.getElementById("fU").value.trim(),pf=document.getElementById("fP").value,sb=document.getElementById("fS").value.trim();
  if(url)data.source_url=url;if(pf)data.source_platform=pf;if(sb)data.submitter=sb;
  try{var r=await fetch(qa("material_intake"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation","apikey":K},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());hideModal();toast("AI\u5206\u6790\u4E2D...","tgs");at="material_intake";setTimeout(refreshAll,1000);setTimeout(refreshAll,70000)}
  catch(e){toast("\u5931\u8D25:"+e.message,"tge")}
  finally{btn.disabled=false;btn.textContent="\u63D0\u4EA4\u7D20\u6750 \u00B7 AI \u81EA\u52A8\u5206\u53D1"}
}
var ss=localStorage.getItem("submitter");if(ss)document.getElementById("fS").value=ss;
document.getElementById("fS").addEventListener("change",function(){localStorage.setItem("submitter",this.value)});
(async function(){await lC();rN();rT()})();
</script>
