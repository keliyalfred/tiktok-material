var TG={video_structure:"ts2",bgm_used:"tv",hook_type:"to",content_tier:"ts2",emotion_type:"tv",proof_type:"tt2",benefit_type:"tt2",shot_type:"tp",action_type:"to",video_stage:"ts2",scene_category:"to",convertible_to:"te",emotion_tags:"tp",emotion_keywords:"tp",material_source:"ts2",applicable_scene:"ts2",applicable_category:"tt2",source_origin:"ts2",cost_level:"ta",trust_level:"ta",content_type:"tv",shot_category:"tp",framing:"ti",camera_angle:"ts2",camera_movement:"tv",lighting:"ta",total_duration:"ts2",beat_structure:"tv",transition_style:"to",bgm_tempo:"tv",target_framework:"tt2",tag_category:"to",current_heat:"ta",view_volume:"ti",strategy_type:"ts2",posting_frequency:"ta"};
var at="material_intake",ct={},allRows=[],sortDir="desc",searchTerm="";

function sH(s){var m={"待处理":"sp","处理中":"si","已分发":"sd","已驳回":"sr"};return '<span class="st '+(m[s]||"sp")+'"><span class="dot" style="background:currentColor"></span>'+(s||"未知")+'</span>'}
function cV(r,c){var v=r[c];if(v===null||v===undefined||v==="")return '<span class="ce">\u2014</span>';if(c==="status")return sH(v);if(c==="dispatched_to"){if(!Array.isArray(v)||!v.length)return '<span class="ce">\u2014</span>';return v.map(function(t){return '<span class="tag">'+t+'</span>'}).join("")}if(c==="source_video_url"||c==="video_url"||c==="reference_video_url")return '<a class="cl" href="'+v+'" target="_blank">\u67E5\u770B\u2192</a>';if(c==="view_count"||c==="like_count")return '<span class="cn">'+Number(v).toLocaleString()+'</span>';if(c==="difficulty"){var dc={"入门":"te","进阶":"ta","高阶":"tr"};return '<span class="tag '+(dc[v]||"")+'">'+v+'</span>'}if(TG[c])return '<span class="tag '+TG[c]+'">'+v+'</span>';return '<div class="ct2" onclick="this.classList.toggle(\'expanded\')">'+String(v)+'</div>'}

function rN(){var h="";LL.forEach(function(l){var a=at===l.k?" active":"",c=ct[l.k]!=null?ct[l.k]:"\u00B7",cl=CL[l.k];h+='<button class="ni'+a+'" onclick="sT(\''+l.k+'\')"><span class="nc" style="background:'+cl.b+';color:'+cl.f+'">'+IC[l.k]+'</span>'+l.l+'<span class="nn">'+c+'</span></button>'});document.getElementById("navTabs").innerHTML=h}

async function fC(t){try{var r=await fetch(qa(t,"select=id&limit=0"),{headers:{"Prefer":"count=exact"}});return parseInt(((r.headers.get("content-range")||"").split("/")[1])||"0")}catch(e){return 0}}
async function fR(t){try{var order=sortDir==="asc"?"order=created_at.asc":"order=created_at.desc";var r=await fetch(qa(t,order+"&limit=100"));if(!r.ok)return[];return await r.json()}catch(e){return[]}}

function filterRows(rows){
  if(!searchTerm)return rows;
  var s=searchTerm.toLowerCase();
  return rows.filter(function(r){
    return Object.values(r).some(function(v){return v&&String(v).toLowerCase().indexOf(s)!==-1});
  });
}

function renderRows(rows){
  var cfg=FD[at];
  if(!rows.length) return '<div class="empty"><div class="empty-text">'+(searchTerm?'\u672A\u627E\u5230\u5339\u914D\u7ED3\u679C':'\u6682\u65E0\u6570\u636E')+'</div></div>';
  var canDel=at!=="frameworks";
  var me=localStorage.getItem("submitter")||"";
  var h='<table><thead><tr><th style="width:36px">#</th>';
  cfg.c.forEach(function(c){h+='<th>'+cfg.n[c]+'</th>'});
  if(canDel)h+='<th style="width:50px"></th>';
  h+='</tr></thead><tbody>';
  rows.forEach(function(r,i){
    h+='<tr><td style="color:var(--text3);font-size:12px">'+(i+1)+'</td>';
    cfg.c.forEach(function(c){h+='<td>'+cV(r,c)+'</td>'});
    if(canDel){
      if(me && r.submitter && r.submitter===me){
        h+='<td><button class="del-btn" onclick="confirmDel(\''+r.id+'\')">删除</button></td>';
      }else{
        h+='<td></td>';
      }
    }
    h+='</tr>';
  });
  h+='</tbody></table>';
  return h;
}

async function rT(){
  var lib=LL.find(function(l){return l.k===at}),clr=CL[at];
  document.getElementById("tTitle").innerHTML='<span class="nc" style="background:'+clr.b+';color:'+clr.f+';width:22px;height:22px;border-radius:5px">'+IC[at]+'</span>'+lib.l+' <span class="ct">'+(ct[at]!=null?ct[at]+"\u6761":"")+'</span>';
  document.getElementById("sortLabel").textContent=sortDir==="desc"?"\u6700\u65B0":"\u6700\u65E9";
  document.getElementById("sortBtn").className="sort-btn"+(sortDir==="asc"?" active":"");
  var b=document.getElementById("tBody");
  b.innerHTML='<div class="loading">\u52A0\u8F7D\u4E2D...</div>';
  allRows=await fR(at);
  b.innerHTML=renderRows(filterRows(allRows));
}

function doSearch(){searchTerm=document.getElementById("searchInput").value.trim();document.getElementById("tBody").innerHTML=renderRows(filterRows(allRows))}
function toggleSort(){sortDir=sortDir==="desc"?"asc":"desc";rT()}

function confirmDel(id){
  var w=document.getElementById("confirmWrap");
  w.innerHTML='<div class="confirm-overlay" onclick="if(event.target===this)cancelDel()"><div class="confirm-box"><h4>\u786E\u8BA4\u5220\u9664</h4><p>\u5220\u9664\u540E\u65E0\u6CD5\u6062\u590D\uFF0C\u786E\u5B9A\u8981\u5220\u9664\u8FD9\u6761\u7D20\u6750\u5417\uFF1F</p><div class="confirm-actions"><button class="cb-cancel" onclick="cancelDel()">\u53D6\u6D88</button><button class="cb-delete" onclick="doDel(\''+id+'\')">\u5220\u9664</button></div></div></div>';
}
function cancelDel(){document.getElementById("confirmWrap").innerHTML=""}
async function doDel(id){
  try{
    var r=await fetch(qa(at,"id=eq."+id),{method:"DELETE",headers:{"Content-Type":"application/json"}});
    if(!r.ok)throw new Error("删除失败");
    cancelDel();
    toast("\u5DF2\u5220\u9664","tgs");
    setTimeout(refreshAll,500);
  }catch(e){toast("\u5220\u9664\u5931\u8D25\uFF1A"+e.message,"tge")}
}

async function lC(){await Promise.all(LL.map(async function(l){ct[l.k]=await fC(l.k)}))}
async function refreshAll(){await lC();rN();await rT();toast("\u6570\u636E\u5DF2\u5237\u65B0","tgs")}
function sT(k){at=k;searchTerm="";document.getElementById("searchInput").value="";rN();rT()}
function showModal(){document.getElementById("mO").style.display="flex";setTimeout(function(){document.getElementById("fC").focus()},100)}
function hideModal(){document.getElementById("mO").style.display="none";document.getElementById("fC").value="";document.getElementById("fU").value=""}
function toast(m,t){var c=document.getElementById("toastWrap"),e=document.createElement("div");e.className="toast "+t;e.textContent=m;c.appendChild(e);setTimeout(function(){e.style.opacity="0";e.style.transition="opacity 0.3s";setTimeout(function(){e.remove()},300)},2500)}
async function doSubmit(){
  var content=document.getElementById("fC").value.trim();if(!content){toast("\u8BF7\u586B\u5199\u7D20\u6750\u5185\u5BB9","tge");return}
  var btn=document.getElementById("bS");btn.disabled=true;btn.textContent="\u63D0\u4EA4\u4E2D...";
  var data={raw_content:content},url=document.getElementById("fU").value.trim(),pf=document.getElementById("fP").value,sb=document.getElementById("fS").value.trim();
  if(url)data.source_url=url;if(pf)data.source_platform=pf;if(sb)data.submitter=sb;
  try{var r=await fetch(qa("material_intake"),{method:"POST",headers:{"Content-Type":"application/json","Prefer":"return=representation"},body:JSON.stringify(data)});
  if(!r.ok)throw new Error(await r.text());hideModal();toast("\u7D20\u6750\u5DF2\u63D0\u4EA4\uFF0CAI\u5206\u6790\u4E2D...","tgs");at="material_intake";setTimeout(refreshAll,1000);setTimeout(refreshAll,70000)}
  catch(e){toast("\u63D0\u4EA4\u5931\u8D25\uFF1A"+e.message,"tge")}
  finally{btn.disabled=false;btn.textContent="\u63D0\u4EA4\u7D20\u6750 \u00B7 AI \u81EA\u52A8\u5206\u53D1"}
}
var ss=localStorage.getItem("submitter");if(ss)document.getElementById("fS").value=ss;
document.getElementById("fS").addEventListener("change",function(){localStorage.setItem("submitter",this.value)});
(async function(){await lC();rN();rT()})();
</script>
